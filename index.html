<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPlace - İlan Platformu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #181825;
            --bg-card-hover: #1e1e2e;
            --bg-input: #12121a;
            --border: #27273a;
            --border-light: #313148;
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --primary: #7c3aed;
            --primary-light: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-glow: rgba(124,58,237,0.3);
            --success: #10b981;
            --success-glow: rgba(16,185,129,0.3);
            --warning: #f59e0b;
            --warning-glow: rgba(245,158,11,0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239,68,68,0.3);
            --info: #3b82f6;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .header {
            background: rgba(18,18,26,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.55rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-card);
            color: var(--text);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        .btn:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 600;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-primary:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .btn-success {
            background: var(--success);
            border-color: var(--success);
            color: white;
            box-shadow: 0 0 15px var(--success-glow);
        }
        .btn-success:hover { box-shadow: 0 0 25px var(--success-glow); }

        .btn-danger {
            background: transparent;
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 20px var(--danger-glow);
        }

        .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
        .btn-lg { padding: 0.7rem 1.6rem; font-size: 0.9rem; }

        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text-secondary);
        }
        .btn-ghost:hover { color: var(--text); background: var(--bg-card); border-color: var(--border); }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .hero {
            background: linear-gradient(135deg, #181825 0%, #1a1030 50%, #0f1a2e 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(124,58,237,0.08) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }

        .hero > * { position: relative; }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p { color: var(--text-secondary); font-size: 1rem; }

        .hero-badge {
            display: inline-block;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 0.8rem;
            color: #c4b5fd;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .grid { display: grid; gap: 1rem; }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        .cat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .cat-card:hover {
            border-color: var(--primary);
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cat-card:hover::after { opacity: 1; }

        .cat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            background: rgba(124,58,237,0.1);
            color: var(--primary-light);
        }

        .cat-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .cat-card .cat-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.8rem; }
        .cat-card .cat-meta {
            display: flex;
            gap: 0.8rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .cat-card .cat-meta span {
            background: var(--bg);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .post-card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .post-tag {
            display: inline-block;
            background: rgba(124,58,237,0.1);
            color: var(--primary-light);
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            width: fit-content;
        }

        .post-card h3 { font-size: 1rem; font-weight: 600; line-height: 1.3; }
        .post-card .post-desc { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; flex: 1; }

        .post-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--success);
        }

        .post-meta {
            display: flex;
            gap: 0.8rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .post-meta span { display: flex; align-items: center; gap: 0.3rem; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .modal-close-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .form-group textarea { resize: vertical; min-height: 90px; }

        .admin-tabs {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
        }
        .admin-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .admin-tab:hover { color: var(--text); background: var(--bg-card); }
        .admin-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            text-align: center;
        }
        .stat-box .stat-num {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-box .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            background: var(--bg-secondary);
            padding: 0.8rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        tr:hover td { background: rgba(124,58,237,0.03); }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge-purple { background: rgba(124,58,237,0.15); color: #c4b5fd; }
        .badge-green { background: rgba(16,185,129,0.15); color: #6ee7b7; }
        .badge-red { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .badge-yellow { background: rgba(245,158,11,0.15); color: #fcd34d; }
        .badge-blue { background: rgba(59,130,246,0.15); color: #93c5fd; }

        .owner-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(245,158,11,0.3);
        }

        .alert {
            padding: 0.9rem 1.2rem;
            border-radius: 8px;
            margin: 0.5rem 0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid;
        }
        .alert-info { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); color: #93c5fd; }
        .alert-success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.2); color: #6ee7b7; }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        .footer strong { color: var(--text-secondary); }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.35rem 0.9rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem;
            gap: 1rem;
            color: var(--text-muted);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header-inner { flex-direction: column; }
            .hero h1 { font-size: 1.6rem; }
            .user-area { justify-content: center; }
            .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .stat-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="showPage('home')">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                MarketPlace
            </div>
            <div class="user-area" id="userArea"></div>
        </div>
    </header>

    <main class="container" id="mainContent">
        <div class="loader">
            <div class="spinner"></div>
            <span>Yükleniyor...</span>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 <strong>MarketPlace</strong> &mdash; Kurucu: <strong>TuncaySkay</strong> 👑</p>
    </footer>

    <div class="modal-overlay" id="modal">
        <div class="modal-box" id="modalBox"></div>
    </div>

    <script>
        // API Ayarları
        const JSONBIN_API_KEY = '$2a$10$Xltql7vPEhpVIsCsnp5B9.qg8BgaJxlaPcjGkagMoPDyJlL5YjesK';
        const JSONBIN_BIN_ID = '6a42f9ddda38895dfe12caad';

        const DEFAULT_DATA = {
            users: [{
                id: "owner1",
                username: "TuncaySkay",
                email: "tunay1111115@gmail.com",
                password: "123456&Hack",
                phone: "+994507348856",
                role: "owner",
                category_mod: null,
                status: "active",
                created_at: "2026-06-30T00:00:00.000Z",
                last_login: null
            }],
            categories: [
                { id: 1, name: "Oyun", slug: "oyun", description: "Oyun hesapları, eşyalar, hizmetler", moderator_id: null },
                { id: 2, name: "Giyim", slug: "giyim", description: "Kıyafet, ayakkabı, aksesuarlar", moderator_id: null },
                { id: 3, name: "Teknoloji", slug: "teknoloji", description: "Elektronik, bilgisayar, telefon", moderator_id: null }
            ],
            posts: [],
            logs: []
        };

        let appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        let jsonBinReady = false;

        // ==================== VERİ YÖNETİMİ (SESSION KOPMAZ) ====================
        
        function loadData() {
            const saved = localStorage.getItem('mp_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Kullanıcıları birleştir, owner'ı koru
                    const mergedUsers = [...DEFAULT_DATA.users];
                    if (parsed.users) {
                        parsed.users.forEach(pu => {
                            if (!mergedUsers.find(mu => mu.id === pu.id)) {
                                mergedUsers.push(pu);
                            } else {
                                // Var olan kullanıcıyı güncelle
                                const idx = mergedUsers.findIndex(mu => mu.id === pu.id);
                                if (idx >= 0 && pu.id !== 'owner1') {
                                    mergedUsers[idx] = pu;
                                }
                            }
                        });
                    }
                    appData = {
                        users: mergedUsers,
                        categories: parsed.categories || DEFAULT_DATA.categories,
                        posts: parsed.posts || [],
                        logs: parsed.logs || []
                    };
                } catch(e) {
                    console.error('Veri yükleme hatası:', e);
                }
            }
            // === SESSION ASLA KOPMAZ ===
            const sessionId = localStorage.getItem('mp_session');
            if (sessionId) {
                const found = appData.users.find(u => u.id === sessionId && u.status === 'active');
                appData.currentUser = found || null;
                if (!found) {
                    // Kullanıcı silinmiş veya banlanmış olabilir
                    localStorage.removeItem('mp_session');
                }
            } else {
                appData.currentUser = null;
            }
        }

        function saveData() {
            const toSave = {
                users: appData.users,
                categories: appData.categories,
                posts: appData.posts,
                logs: appData.logs
            };
            localStorage.setItem('mp_data', JSON.stringify(toSave));
            if (jsonBinReady) saveToJSONBin(toSave);
        }

        async function saveToJSONBin(data) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });
            } catch(e) {}
        }

        async function loadFromJSONBin() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (res.ok) {
                    const result = await res.json();
                    const remoteData = result.record;
                    // Uzaktan gelen kullanıcıları birleştir
                    if (remoteData.users) {
                        const mergedUsers = [...DEFAULT_DATA.users];
                        remoteData.users.forEach(ru => {
                            if (!mergedUsers.find(mu => mu.id === ru.id)) {
                                mergedUsers.push(ru);
                            } else {
                                const idx = mergedUsers.findIndex(mu => mu.id === ru.id);
                                if (idx >= 0 && ru.id !== 'owner1') {
                                    mergedUsers[idx] = ru;
                                }
                            }
                        });
                        appData.users = mergedUsers;
                    }
                    if (remoteData.categories) appData.categories = remoteData.categories;
                    if (remoteData.posts) appData.posts = remoteData.posts;
                    if (remoteData.logs) appData.logs = remoteData.logs;
                    saveData();
                    // === SESSION TEKRAR KONTROL ===
                    const sessionId = localStorage.getItem('mp_session');
                    if (sessionId) {
                        appData.currentUser = appData.users.find(u => u.id === sessionId && u.status === 'active') || null;
                    }
                }
                jsonBinReady = true;
            } catch(e) {
                jsonBinReady = true;
            }
        }

        // ==================== YARDIMCILAR ====================
        function genId() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9); }
        function fmtDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        function esc(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function trunc(text, len=100) { return text.length <= len ? text : text.substring(0, len) + '...'; }
        function postCount(catId) { return appData.posts.filter(p => p.category_id === catId && p.status === 'approved').length; }
        function modName(cat) {
            if (cat.moderator_id) { const m = appData.users.find(u => u.id === cat.moderator_id); return m ? m.username : null; }
            return null;
        }
        function isOwner() { return appData.currentUser?.role === 'owner'; }
        function isAdmin() { return appData.currentUser && (appData.currentUser.role === 'admin' || appData.currentUser.role === 'owner'); }
        function isMod() { return appData.currentUser && (appData.currentUser.role === 'moderator' || appData.currentUser.role === 'admin' || appData.currentUser.role === 'owner'); }
        function roleBadge(role) {
            if (role === 'owner') return '<span class="owner-badge">KURUCU</span>';
            if (role === 'admin') return '<span class="badge badge-blue">Admin</span>';
            if (role === 'moderator') return '<span class="badge badge-purple">Mod</span>';
            return '';
        }

        // ==================== SAYFALAR ====================
        function showPage(page, param=null) {
            switch(page) {
                case 'home': renderHome(); break;
                case 'category': renderCategory(param); break;
                case 'post': renderPostDetail(param); break;
                case 'new-post': renderNewPost(); break;
                case 'admin': renderAdmin(); break;
                case 'profile': renderProfile(); break;
            }
            updateHeader();
            window.scrollTo(0, 0);
        }

        function updateHeader() {
            const area = document.getElementById('userArea');
            const u = appData.currentUser;
            if (u) {
                area.innerHTML = `
                    <div class="user-chip">
                        <div class="user-avatar">${u.username.charAt(0).toUpperCase()}</div>
                        <span>${esc(u.username)}</span>
                        ${roleBadge(u.role)}
                    </div>
                    ${isMod() ? `<button class="btn btn-ghost btn-sm" onclick="showPage('admin')"><i class="fas fa-shield-halved"></i> Panel</button>` : ''}
                    <button class="btn btn-ghost btn-sm" onclick="showPage('profile')"><i class="fas fa-user"></i> Profil</button>
                    <button class="btn btn-primary btn-sm" onclick="showPage('new-post')"><i class="fas fa-plus"></i> İlan Ver</button>
                    <button class="btn btn-ghost btn-sm" onclick="logout()" style="color:var(--danger);"><i class="fas fa-right-from-bracket"></i></button>
                `;
            } else {
                area.innerHTML = `
                    <button class="btn btn-ghost btn-sm" onclick="showAuth('login')"><i class="fas fa-right-to-bracket"></i> Giriş</button>
                    <button class="btn btn-primary btn-sm" onclick="showAuth('register')"><i class="fas fa-user-plus"></i> Kayıt Ol</button>
                `;
            }
        }

        // ==================== ANA SAYFA ====================
        function renderHome() {
            const main = document.getElementById('mainContent');
            const approved = appData.posts.filter(p => p.status === 'approved').sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 6);

            main.innerHTML = `
                <div class="hero">
                    <h1>MarketPlace</h1>
                    <p>Güvenli alışveriş platformu</p>
                    <div class="hero-badge">👑 Kurucu: TuncaySkay</div>
                </div>

                <div class="section-header"><h2>📂 Kategoriler</h2></div>
                <div class="grid grid-3" style="margin-bottom:2rem;">
                    ${appData.categories.map(c => `
                        <div class="cat-card" onclick="showPage('category', '${c.slug}')">
                            <div class="cat-icon">${c.slug==='oyun'?'🎮':c.slug==='giyim'?'👕':'💻'}</div>
                            <h3>${esc(c.name)}</h3>
                            <p class="cat-desc">${esc(c.description)}</p>
                            <div class="cat-meta">
                                <span><i class="fas fa-list"></i> ${postCount(c.id)} ilan</span>
                                ${modName(c) ? `<span><i class="fas fa-shield"></i> ${esc(modName(c))}</span>` : ''}
                            </div>
                            <button class="btn btn-primary btn-sm" style="width:100%;">İlanları Gör <i class="fas fa-arrow-right"></i></button>
                        </div>
                    `).join('')}
                </div>

                <div class="section-header"><h2>🔥 Son İlanlar</h2></div>
                <div class="grid grid-4">
                    ${approved.length ? approved.map(p => {
                        const cat = appData.categories.find(c => c.id === p.category_id);
                        const user = appData.users.find(u => u.id === p.user_id);
                        return `
                            <div class="post-card" onclick="showPage('post', '${p.id}')">
                                <span class="post-tag">${cat ? esc(cat.name) : ''}</span>
                                <h3>${esc(p.title)}</h3>
                                <p class="post-desc">${esc(trunc(p.description))}</p>
                                ${p.price > 0 ? `<div class="post-price">₺${parseFloat(p.price).toFixed(2)}</div>` : ''}
                                <div class="post-meta">
                                    <span><i class="fas fa-user"></i> ${user ? esc(user.username) : 'Anonim'}</span>
                                    <span><i class="fas fa-clock"></i> ${fmtDate(p.created_at)}</span>
                                </div>
                            </div>
                        `;
                    }).join('') : '<div class="alert alert-info"><i class="fas fa-info-circle"></i> Henüz onaylı ilan yok.</div>'}
                </div>
            `;
        }

        function renderCategory(slug) {
            const main = document.getElementById('mainContent');
            const cat = appData.categories.find(c => c.slug === slug);
            if (!cat) { renderHome(); return; }
            const posts = appData.posts.filter(p => p.category_id === cat.id && p.status === 'approved').sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

            main.innerHTML = `
                <button class="btn btn-ghost btn-sm" onclick="showPage('home')" style="margin-bottom:1rem;"><i class="fas fa-arrow-left"></i> Ana Sayfa</button>
                <h1 style="font-size:1.5rem;margin-bottom:0.3rem;">${esc(cat.name)}</h1>
                <p style="color:var(--text-muted);margin-bottom:0.5rem;">${esc(cat.description)} &bull; ${posts.length} ilan</p>
                ${modName(cat) ? `<span class="badge badge-purple"><i class="fas fa-shield"></i> Mod: ${esc(modName(cat))}</span>` : ''}
                <div class="grid grid-4" style="margin-top:1.5rem;">
                    ${posts.length ? posts.map(p => {
                        const user = appData.users.find(u => u.id === p.user_id);
                        return `
                            <div class="post-card" onclick="showPage('post', '${p.id}')">
                                <h3>${esc(p.title)}</h3>
                                <p class="post-desc">${esc(trunc(p.description))}</p>
                                ${p.price > 0 ? `<div class="post-price">₺${parseFloat(p.price).toFixed(2)}</div>` : ''}
                                <div class="post-meta">
                                    <span><i class="fas fa-user"></i> ${user ? esc(user.username) : 'Anonim'}</span>
                                    <span><i class="fas fa-clock"></i> ${fmtDate(p.created_at)}</span>
                                </div>
                            </div>
                        `;
                    }).join('') : '<div class="alert alert-info"><i class="fas fa-info-circle"></i> İlan yok.</div>'}
                </div>
            `;
        }

        function renderPostDetail(postId) {
            const main = document.getElementById('mainContent');
            const post = appData.posts.find(p => p.id === postId);
            if (!post) { renderHome(); return; }
            const cat = appData.categories.find(c => c.id === post.category_id);
            const user = appData.users.find(u => u.id === post.user_id);

            main.innerHTML = `
                <button class="btn btn-ghost btn-sm" onclick="showPage('category', '${cat?.slug || ''}')" style="margin-bottom:1rem;"><i class="fas fa-arrow-left"></i> Geri</button>
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;">
                    <span class="post-tag">${cat ? esc(cat.name) : ''}</span>
                    <h1 style="font-size:1.5rem;margin:0.8rem 0;">${esc(post.title)}</h1>
                    <div style="background:var(--bg);padding:1.2rem;border-radius:8px;margin:1rem 0;white-space:pre-wrap;color:var(--text-secondary);line-height:1.7;">${esc(post.description)}</div>
                    ${post.price > 0 ? `<p style="font-size:1.6rem;font-weight:700;color:var(--success);">₺${parseFloat(post.price).toFixed(2)}</p>` : ''}
                    <div style="background:var(--bg-secondary);border:1px solid var(--border);padding:1.2rem;border-radius:8px;margin:1rem 0;">
                        <h4 style="margin-bottom:0.8rem;">📞 İletişim</h4>
                        ${post.contact_email ? `<p style="margin:0.4rem 0;"><i class="fas fa-envelope" style="color:var(--primary);width:20px;"></i> ${esc(post.contact_email)}</p>` : ''}
                        ${post.contact_phone ? `<p style="margin:0.4rem 0;"><i class="fas fa-phone" style="color:var(--success);width:20px;"></i> ${esc(post.contact_phone)}</p>` : ''}
                        ${post.contact_discord ? `<p style="margin:0.4rem 0;"><i class="fab fa-discord" style="color:#5865f2;width:20px;"></i> ${esc(post.contact_discord)}</p>` : ''}
                        ${!post.contact_email && !post.contact_phone && !post.contact_discord ? '<p style="color:var(--text-muted);">İletişim bilgisi yok.</p>' : ''}
                    </div>
                    <div class="post-meta" style="gap:1.5rem;">
                        <span><i class="fas fa-user"></i> ${user ? esc(user.username) : 'Anonim'}</span>
                        <span><i class="fas fa-calendar"></i> ${fmtDate(post.created_at)}</span>
                    </div>
                </div>
            `;
        }

        function renderNewPost() {
            if (!appData.currentUser) { showAuth('login'); return; }
            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div style="max-width:600px;margin:0 auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;">
                    <h1><i class="fas fa-plus-circle" style="color:var(--primary);"></i> Yeni İlan</h1>
                    <form id="postForm" onsubmit="submitPost(event)" style="margin-top:1.5rem;">
                        <div class="form-group">
                            <label>Kategori *</label>
                            <select name="category_id" required>
                                <option value="">Seçiniz</option>
                                ${appData.categories.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group"><label>Başlık *</label><input name="title" required maxlength="200" placeholder="Rp Grand Mobile Satılık Hesap"></div>
                        <div class="form-group"><label>Açıklama *</label><textarea name="description" required placeholder="Detaylar..."></textarea></div>
                        <div class="form-group"><label>Fiyat (₺)</label><input type="number" name="price" step="0.01" min="0" placeholder="0.00"></div>
                        <div class="form-group"><label>E-posta</label><input type="email" name="contact_email" placeholder="ornek@mail.com"></div>
                        <div class="form-group"><label>Telefon</label><input type="tel" name="contact_phone" placeholder="5XX XXX XX XX"></div>
                        <div class="form-group"><label>Discord</label><input name="contact_discord" placeholder="kullanici#1234"></div>
                        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;"><i class="fas fa-paper-plane"></i> Gönder</button>
                    </form>
                </div>
            `;
        }

        function submitPost(e) {
            e.preventDefault();
            const f = new FormData(e.target);
            const post = {
                id: genId(),
                user_id: appData.currentUser.id,
                category_id: parseInt(f.get('category_id')),
                title: f.get('title').trim(),
                description: f.get('description').trim(),
                price: parseFloat(f.get('price')) || 0,
                contact_email: f.get('contact_email').trim(),
                contact_phone: f.get('contact_phone').trim(),
                contact_discord: f.get('contact_discord').trim(),
                status: 'pending',
                created_at: new Date().toISOString(),
                approved_by: null,
                approved_at: null
            };
            appData.posts.unshift(post);
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'post_created', details: post.title, created_at: new Date().toISOString() });
            saveData();
            alert('✅ İlan gönderildi, onay bekliyor.');
            showPage('home');
        }

        function renderProfile() {
            if (!appData.currentUser) { showAuth('login'); return; }
            const main = document.getElementById('mainContent');
            const u = appData.currentUser;
            const posts = appData.posts.filter(p => p.user_id === u.id).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

            main.innerHTML = `
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;">
                    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;">
                        <div style="width:55px;height:55px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:white;">${u.username.charAt(0).toUpperCase()}</div>
                        <div>
                            <h2 style="display:flex;align-items:center;gap:0.5rem;">${esc(u.username)} ${roleBadge(u.role)}</h2>
                            <p style="color:var(--text-muted);">${esc(u.email)}</p>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-box"><div class="stat-label">Rol</div><div style="font-weight:600;margin-top:0.3rem;">${u.role}</div></div>
                        <div class="stat-box"><div class="stat-label">Telefon</div><div style="font-weight:600;margin-top:0.3rem;">${esc(u.phone||'—')}</div></div>
                        <div class="stat-box"><div class="stat-label">Kayıt</div><div style="font-weight:600;margin-top:0.3rem;">${fmtDate(u.created_at)}</div></div>
                        <div class="stat-box"><div class="stat-label">İlan</div><div class="stat-num">${posts.length}</div></div>
                    </div>
                    <h3 style="margin-bottom:1rem;">📋 İlanlarım</h3>
                    <div class="grid grid-4">
                        ${posts.length ? posts.map(p => {
                            const cat = appData.categories.find(c => c.id === p.category_id);
                            const sb = p.status === 'approved' ? 'badge-green' : p.status === 'pending' ? 'badge-yellow' : 'badge-red';
                            const st = p.status === 'approved' ? '✅ Onaylı' : p.status === 'pending' ? '⏳ Bekliyor' : '❌ Reddedildi';
                            return `
                                <div class="post-card" style="border-left:3px solid ${p.status==='approved'?'var(--success)':p.status==='pending'?'var(--warning)':'var(--danger)'};">
                                    <span class="badge ${sb}">${st}</span>
                                    <span class="post-tag">${cat ? esc(cat.name) : ''}</span>
                                    <h3>${esc(p.title)}</h3>
                                    <p class="post-desc">${esc(trunc(p.description, 60))}</p>
                                    ${p.price > 0 ? `<div class="post-price">₺${parseFloat(p.price).toFixed(2)}</div>` : ''}
                                    <small style="color:var(--text-muted);">${fmtDate(p.created_at)}</small>
                                </div>
                            `;
                        }).join('') : '<div class="alert alert-info"><i class="fas fa-info-circle"></i> İlan yok.</div>'}
                    </div>
                </div>
            `;
        }

        // ==================== ADMIN ====================
        function renderAdmin() {
            if (!isMod()) { showPage('home'); return; }
            const main = document.getElementById('mainContent');
            const pending = appData.posts.filter(p => p.status === 'pending').length;

            main.innerHTML = `
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;">
                    <h2><i class="fas fa-shield-halved" style="color:var(--primary);"></i> Yönetim Paneli ${isOwner() ? '<span class="owner-badge">KURUCU</span>' : ''}</h2>
                    <div class="admin-tabs">
                        <button class="admin-tab active" onclick="switchTab('dash', this)">📊 Özet</button>
                        <button class="admin-tab" onclick="switchTab('approve', this)">✅ Onayla <span class="badge badge-yellow">${pending}</span></button>
                        ${isAdmin() ? '<button class="admin-tab" onclick="switchTab(\'users\', this)">👥 Kullanıcılar</button>' : ''}
                        ${isAdmin() ? '<button class="admin-tab" onclick="switchTab(\'cats\', this)">📂 Kategoriler</button>' : ''}
                        ${isOwner() ? '<button class="admin-tab" onclick="switchTab(\'logs\', this)">📝 Loglar</button>' : ''}
                    </div>
                    <div id="tabContent"></div>
                </div>
            `;
            renderTabDash();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tab === 'dash') renderTabDash();
            else if (tab === 'approve') renderTabApprove();
            else if (tab === 'users') renderTabUsers();
            else if (tab === 'cats') renderTabCats();
            else if (tab === 'logs') renderTabLogs();
        }

        function renderTabDash() {
            const tc = document.getElementById('tabContent');
            tc.innerHTML = `
                <div class="stat-row" style="margin-top:1rem;">
                    <div class="stat-box"><div class="stat-label">Kullanıcı</div><div class="stat-num">${appData.users.length}</div></div>
                    <div class="stat-box"><div class="stat-label">İlan</div><div class="stat-num">${appData.posts.length}</div></div>
                    <div class="stat-box"><div class="stat-label">Bekleyen</div><div class="stat-num" style="background:linear-gradient(135deg,#f59e0b,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${appData.posts.filter(p=>p.status==='pending').length}</div></div>
                    <div class="stat-box"><div class="stat-label">Onaylı</div><div class="stat-num" style="background:linear-gradient(135deg,#10b981,#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${appData.posts.filter(p=>p.status==='approved').length}</div></div>
                </div>
            `;
        }

        function renderTabApprove() {
            const tc = document.getElementById('tabContent');
            let pending = appData.posts.filter(p => p.status === 'pending');
            if (appData.currentUser.role === 'moderator' && appData.currentUser.category_mod) {
                const cat = appData.categories.find(c => c.slug === appData.currentUser.category_mod);
                if (cat) pending = pending.filter(p => p.category_id === cat.id);
            }
            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Bekleyen (${pending.length})</h4>
                ${pending.length === 0 ? '<div class="alert alert-success"><i class="fas fa-check"></i> Bekleyen yok.</div>' :
                pending.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map(p => {
                    const cat = appData.categories.find(c=>c.id===p.category_id);
                    const user = appData.users.find(u=>u.id===p.user_id);
                    return `
                        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1.2rem;margin:0.8rem 0;">
                            <span class="post-tag">${cat?esc(cat.name):''}</span>
                            <h4 style="margin:0.5rem 0;">${esc(p.title)}</h4>
                            <p style="color:var(--text-secondary);white-space:pre-wrap;">${esc(p.description)}</p>
                            ${p.price>0?`<p style="color:var(--success);font-weight:600;">₺${parseFloat(p.price).toFixed(2)}</p>`:''}
                            <div style="font-size:0.8rem;color:var(--text-muted);margin:0.4rem 0;">
                                ${p.contact_email?`<span style="margin-right:1rem;"><i class="fas fa-envelope"></i> ${esc(p.contact_email)}</span>`:''}
                                ${p.contact_phone?`<span style="margin-right:1rem;"><i class="fas fa-phone"></i> ${esc(p.contact_phone)}</span>`:''}
                                ${p.contact_discord?`<span><i class="fab fa-discord"></i> ${esc(p.contact_discord)}</span>`:''}
                            </div>
                            <small style="color:var(--text-muted);">${user?esc(user.username):'Anonim'} &bull; ${fmtDate(p.created_at)}</small>
                            <div style="margin-top:0.8rem;display:flex;gap:0.5rem;">
                                <button class="btn btn-success btn-sm" onclick="approve('${p.id}','approve')"><i class="fas fa-check"></i> Onayla</button>
                                <button class="btn btn-danger btn-sm" onclick="approve('${p.id}','reject')"><i class="fas fa-times"></i> Reddet</button>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function approve(pid, action) {
            const p = appData.posts.find(x => x.id === pid);
            if (!p) return;
            p.status = action === 'approve' ? 'approved' : 'rejected';
            p.approved_by = appData.currentUser.id;
            p.approved_at = new Date().toISOString();
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'post_'+action, details: p.title, created_at: new Date().toISOString() });
            saveData();
            alert('✅ İlan ' + (action==='approve'?'onaylandı':'reddedildi'));
            renderAdmin();
        }

        function renderTabUsers() {
            const tc = document.getElementById('tabContent');
            if (!isAdmin()) return;
            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Kullanıcılar (${appData.users.length})</h4>
                <div class="table-wrap">
                    <table><thead><tr><th>Kullanıcı</th><th>E-posta</th><th>Rol</th><th>Mod Kat.</th><th>Durum</th><th>Ban</th></tr></thead><tbody>
                    ${appData.users.map(u => {
                        const isO = u.role === 'owner';
                        return `<tr>
                            <td><strong>${esc(u.username)}</strong> ${roleBadge(u.role)}</td>
                            <td>${esc(u.email)}</td>
                            <td>${isO ? 'KURUCU' : `<select onchange="changeRole('${u.id}',this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.3rem;border-radius:4px;"><option value="user" ${u.role==='user'?'selected':''}>Kullanıcı</option><option value="moderator" ${u.role==='moderator'?'selected':''}>Moderatör</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select>`}</td>
                            <td>${u.role==='moderator' ? `<select onchange="changeModCat('${u.id}',this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.3rem;border-radius:4px;"><option value="">—</option>${appData.categories.map(c=>`<option value="${c.slug}" ${u.category_mod===c.slug?'selected':''}>${esc(c.name)}</option>`).join('')}</select>` : '—'}</td>
                            <td><span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status==='active'?'Aktif':'Banlı'}</span></td>
                            <td>${isO ? '<span class="badge badge-yellow">Koruma</span>' : `<button class="btn btn-sm ${u.status==='active'?'btn-danger':'btn-success'}" onclick="toggleBan('${u.id}')">${u.status==='active'?'Banla':'Aç'}</button>`}</td>
                        </tr>`;
                    }).join('')}
                    </tbody></table>
                </div>
            `;
        }

        function changeRole(uid, role) {
            const u = appData.users.find(x => x.id === uid);
            if (!u || u.role === 'owner') return;
            u.role = role;
            if (role !== 'moderator') { u.category_mod = null; appData.categories.forEach(c => { if(c.moderator_id === uid) c.moderator_id = null; }); }
            saveData();
            alert('✅ Rol güncellendi');
            renderAdmin();
        }

        function changeModCat(uid, slug) {
            const u = appData.users.find(x => x.id === uid);
            if (!u) return;
            if (u.category_mod) { const old = appData.categories.find(c => c.slug === u.category_mod); if(old) old.moderator_id = null; }
            u.category_mod = slug || null;
            if (slug) { const nc = appData.categories.find(c => c.slug === slug); if(nc) nc.moderator_id = uid; }
            saveData();
            alert('✅ Kategori atandı');
            renderAdmin();
        }

        function toggleBan(uid) {
            if (uid === appData.currentUser.id) { alert('❌ Kendini banlayamazsın'); return; }
            const u = appData.users.find(x => x.id === uid);
            if (!u || u.role === 'owner') return;
            u.status = u.status === 'active' ? 'banned' : 'active';
            saveData();
            alert('✅ ' + (u.status === 'active' ? 'Ban kaldırıldı' : 'Banlandı'));
            renderAdmin();
        }

        function renderTabCats() {
            const tc = document.getElementById('tabContent');
            if (!isAdmin()) return;
            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Kategoriler</h4>
                <div class="table-wrap">
                    <table><thead><tr><th>ID</th><th>Ad</th><th>Açıklama</th><th>Moderatör</th><th>İlan</th></tr></thead><tbody>
                    ${appData.categories.map(c => `
                        <tr><td>#${c.id}</td><td><strong>${esc(c.name)}</strong></td><td>${esc(c.description)}</td><td>${modName(c)?esc(modName(c)):'<span style="color:var(--text-muted);">—</span>'}</td><td>${postCount(c.id)}</td></tr>
                    `).join('')}
                    </tbody></table>
                </div>
            `;
        }

        function renderTabLogs() {
            const tc = document.getElementById('tabContent');
            if (!isOwner()) return;
            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Loglar (${appData.logs.length})</h4>
                <div class="table-wrap">
                    <table><thead><tr><th>Tarih</th><th>Kullanıcı</th><th>İşlem</th><th>Detay</th></tr></thead><tbody>
                    ${appData.logs.slice().reverse().slice(0,100).map(l => {
                        const user = appData.users.find(u => u.id === l.user_id);
                        return `<tr><td>${fmtDate(l.created_at)}</td><td>${user?esc(user.username):'Sistem'}</td><td><span class="badge badge-blue">${esc(l.action)}</span></td><td>${esc(l.details)}</td></tr>`;
                    }).join('')}
                    </tbody></table>
                </div>
            `;
        }

        // ==================== AUTH ====================
        function showAuth(type) {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalBox');
            box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3>${type==='login'?'👋 Giriş':'🎉 Kayıt'}</h3>
                <form onsubmit="${type==='login'?'doLogin(event)':'doRegister(event)'}" style="margin-top:1.2rem;">
                    <div class="form-group"><label>Kullanıcı Adı</label><input name="username" required minlength="3"></div>
                    <div class="form-group"><label>E-posta</label><input type="email" name="email" required></div>
                    <div class="form-group"><label>Şifre</label><input type="password" name="password" required minlength="6"></div>
                    ${type==='register'?'<div class="form-group"><label>Telefon</label><input name="phone"></div>':''}
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">${type==='login'?'Giriş':'Kayıt'}</button>
                </form>
                <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted);">
                    ${type==='login'?'Hesabın yok mu?':'Hesabın var mı?'}
                    <a href="#" onclick="showAuth('${type==='login'?'register':'login'}')" style="color:var(--primary-light);font-weight:600;">${type==='login'?'Kayıt Ol':'Giriş Yap'}</a>
                </p>
            `;
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function doLogin(e) {
            e.preventDefault();
            const f = e.target;
            const user = appData.users.find(u => (u.username === f.username.value.trim() || u.email === f.email.value.trim()) && u.password === f.password.value);
            if (!user) { alert('❌ Hatalı giriş'); return; }
            if (user.status === 'banned') { alert('❌ Banlandın'); return; }
            user.last_login = new Date().toISOString();
            appData.currentUser = user;
            localStorage.setItem('mp_session', user.id);
            appData.logs.push({ id: genId(), user_id: user.id, action: 'login', details: 'Giriş', created_at: new Date().toISOString() });
            saveData();
            closeModal();
            updateHeader();
            showPage('home');
        }

        function doRegister(e) {
            e.preventDefault();
            const f = e.target;
            const uname = f.username.value.trim();
            const email = f.email.value.trim();
            if (appData.users.find(u => u.username === uname)) { alert('❌ Kullanıcı adı alınmış'); return; }
            if (appData.users.find(u => u.email === email)) { alert('❌ E-posta kayıtlı'); return; }
            const newUser = {
                id: genId(), username: uname, email, password: f.password.value,
                phone: f.phone?.value?.trim() || '', role: 'user', category_mod: null,
                status: 'active', created_at: new Date().toISOString(), last_login: new Date().toISOString()
            };
            appData.users.push(newUser);
            appData.currentUser = newUser;
            localStorage.setItem('mp_session', newUser.id);
            appData.logs.push({ id: genId(), user_id: newUser.id, action: 'register', details: 'Kayıt', created_at: new Date().toISOString() });
            saveData();
            closeModal();
            updateHeader();
            showPage('home');
        }

        function logout() {
            if (appData.currentUser) {
                appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'logout', details: 'Çıkış', created_at: new Date().toISOString() });
            }
            appData.currentUser = null;
            localStorage.removeItem('mp_session');
            saveData();
            updateHeader();
            showPage('home');
        }

        // ==================== BAŞLATMA ====================
        window.onclick = function(e) { if (e.target === document.getElementById('modal')) closeModal(); };
        window.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        window.onload = async function() {
            loadData();
            await loadFromJSONBin();
            updateHeader();
            showPage('home');
        };
    </script>
</body>
</html>
