<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPlace - İlan Platformu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #181825;
            --bg-card-hover: #1e1e2e;
            --bg-input: #12121a;
            --border: #27273a;
            --border-light: #313148;
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --primary: #7c3aed;
            --primary-light: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-glow: rgba(124,58,237,0.3);
            --success: #10b981;
            --success-glow: rgba(16,185,129,0.3);
            --warning: #f59e0b;
            --warning-glow: rgba(245,158,11,0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239,68,68,0.3);
            --info: #3b82f6;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--primary-glow); }
            50% { box-shadow: 0 0 40px rgba(124,58,237,0.6); }
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Header */
        .header {
            background: rgba(18,18,26,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease-out;
        }

        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.03em;
            transition: var(--transition);
        }
        .logo:hover {
            transform: scale(1.03);
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            animation: pulse 2s infinite;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 0.55rem 1.3rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            color: var(--text);
            white-space: nowrap;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: white;
            font-weight: 600;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            box-shadow: 0 0 35px var(--primary-glow);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 15px var(--success-glow);
        }
        .btn-success:hover {
            box-shadow: 0 0 30px var(--success-glow);
        }

        .btn-danger {
            background: transparent;
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 25px var(--danger-glow);
        }

        .btn-warning {
            background: transparent;
            border-color: var(--warning);
            color: var(--warning);
        }
        .btn-warning:hover {
            background: var(--warning);
            color: #000;
        }

        .btn-sm { padding: 0.38rem 0.9rem; font-size: 0.78rem; border-radius: 8px; }
        .btn-lg { padding: 0.75rem 1.8rem; font-size: 0.95rem; border-radius: 12px; }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            color: var(--text);
            background: var(--bg-card);
            border-color: var(--border);
            box-shadow: none;
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #181825 0%, #1a1030 30%, #0f1a2e 70%, #181825 100%);
            background-size: 300% 300%;
            animation: gradientShift 10s ease infinite;
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 3.5rem 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(124,58,237,0.1) 0%, transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(6,182,212,0.1) 0%, transparent 60%);
        }

        .hero > * { position: relative; z-index: 1; }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed, #06b6d4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #c4b5fd;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        /* Section */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.2rem;
        }
        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }
        .grid-4 {
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }

        /* Category Card */
        .cat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem 1.8rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }

        .cat-card:hover {
            border-color: var(--primary);
            background: var(--bg-card-hover);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4), 0 0 30px rgba(124,58,237,0.1);
        }

        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        .cat-card:hover::before {
            transform: scaleX(1);
        }

        .cat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(124,58,237,0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .cat-card:hover::after {
            opacity: 1;
        }

        .cat-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
            background: rgba(124,58,237,0.1);
            color: var(--primary-light);
            transition: var(--transition);
        }
        .cat-card:hover .cat-icon {
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            color: white;
            transform: rotate(5deg) scale(1.1);
            box-shadow: 0 8px 25px rgba(124,58,237,0.3);
        }

        .cat-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .cat-card .cat-desc {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .cat-card .cat-meta {
            display: flex;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .cat-card .cat-meta span {
            background: var(--bg);
            padding: 0.35rem 0.8rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 500;
        }

        /* Post Card */
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            animation: fadeInUp 0.4s ease-out forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        .post-card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }

        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: var(--radius);
            background: var(--bg-secondary);
            transition: var(--transition);
        }
        .post-card:hover .post-image {
            transform: scale(1.02);
        }

        .post-image-placeholder {
            width: 100%;
            height: 200px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-muted);
            border: 1px dashed var(--border);
        }

        .post-tag {
            display: inline-block;
            background: rgba(124,58,237,0.1);
            color: var(--primary-light);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            width: fit-content;
            letter-spacing: 0.02em;
        }

        .post-card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
        }
        .post-card .post-desc {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.6;
            flex: 1;
        }

        .post-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--success);
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .post-meta span {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2rem;
            width: 100%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: scaleIn 0.3s ease-out;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 1rem;
        }
        .modal-close-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            transform: rotate(90deg);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.84rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-input);
        }
        .image-upload-area:hover {
            border-color: var(--primary);
            background: rgba(124,58,237,0.05);
        }
        .image-upload-area.has-image {
            border-color: var(--success);
            border-style: solid;
        }
        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        /* Admin */
        .admin-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }
        .admin-tab {
            padding: 0.55rem 1.2rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .admin-tab:hover {
            color: var(--text);
            background: var(--bg-card);
            border-color: var(--border);
        }
        .admin-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            transition: var(--transition);
        }
        .stat-box:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .stat-num {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.86rem;
        }
        th {
            background: var(--bg-secondary);
            padding: 0.9rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border);
        }
        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        tr {
            transition: var(--transition);
        }
        tbody tr:hover td {
            background: rgba(124,58,237,0.04);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .badge-purple { background: rgba(124,58,237,0.15); color: #c4b5fd; }
        .badge-green { background: rgba(16,185,129,0.15); color: #6ee7b7; }
        .badge-red { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .badge-yellow { background: rgba(245,158,11,0.15); color: #fcd34d; }
        .badge-blue { background: rgba(59,130,246,0.15); color: #93c5fd; }
        .badge-orange { background: rgba(249,115,22,0.15); color: #fdba74; }
        .badge-pink { background: rgba(236,72,153,0.15); color: #f9a8d4; }

        .owner-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 0.25rem 0.8rem;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(245,158,11,0.4);
            animation: pulse 2s infinite;
        }

        /* Alert */
        .alert {
            padding: 1rem 1.3rem;
            border-radius: 10px;
            margin: 0.8rem 0;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid;
            animation: fadeIn 0.3s ease;
        }
        .alert-info { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.25); color: #93c5fd; }
        .alert-success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #6ee7b7; }
        .alert-danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #fca5a5; }
        .alert-warning { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.25); color: #fcd34d; }

        /* Comment */
        .comment-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .comment {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem;
            margin: 0.6rem 0;

        // Resim sıkıştırma (Base64)
        function compressImage(file, maxWidth=800) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function addComment(e, postId) {
            e.preventDefault();
            if (!appData.currentUser) return;
            const text = e.target.comment_text.value.trim();
            if (!text) return;
            const post = appData.posts.find(p => p.id === postId);
            if (!post || post.comments_locked) { alert('❌ Yorumlar kilitli!'); return; }
            appData.comments.push({ id: genId(), post_id: postId, user_id: appData.currentUser.id, text, created_at: new Date().toISOString() });
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'comment_added', details: `İlan: ${post.title}`, created_at: new Date().toISOString() });
            saveData();
            showPage('post', postId);
        }

        function deleteComment(commentId, postId) {
            if (!confirm('Yorumu silmek istediğinize emin misiniz?')) return;
            const ci = appData.comments.findIndex(c => c.id === commentId);
            if (ci >= 0) {
                const c = appData.comments[ci];
                const post = appData.posts.find(p => p.id === c.post_id);
                if (appData.currentUser && (canModifyComments(post) || c.user_id === appData.currentUser.id)) {
                    appData.comments.splice(ci, 1);
                    appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'comment_deleted', details: `İlan: ${post?.title}`, created_at: new Date().toISOString() });
                    saveData();
                    showPage('post', postId);
                }
            }
        }

        function toggleComments(postId) {
            const post = appData.posts.find(p => p.id === postId);
            if (!post || !canModifyComments(post)) return;
            post.comments_locked = !post.comments_locked;
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: post.comments_locked ? 'comments_locked' : 'comments_unlocked', details: `İlan: ${post.title}`, created_at: new Date().toISOString() });
            saveData();
            showPage('post', postId);
        }

        function deletePost(postId) {
            if (!confirm('Bu ilanı silmek istediğinize emin misiniz? Bu işlem geri alınamaz!')) return;
            const post = appData.posts.find(p => p.id === postId);
            if (!post || !canDeletePost(post)) { alert('❌ Bu işlem için yetkiniz yok!'); return; }
            appData.posts = appData.posts.filter(p => p.id !== postId);
            appData.comments = appData.comments.filter(c => c.post_id !== postId);
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'post_deleted', details: `İlan: ${post.title}`, created_at: new Date().toISOString() });
            saveData();
            alert('✅ İlan başarıyla silindi.');
            showPage('home');
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { alert('❌ Fotoğraf en fazla 5MB olabilir.'); return; }
            
            const compressed = await compressImage(file);
            document.getElementById('imageData').value = compressed;
            document.getElementById('imagePreview').src = compressed;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('imageUploadArea').classList.add('has-image');
            document.getElementById('removeImageBtn').style.display = 'inline-flex';
        }

            document.getElementById('imageData').value = '';

                tc.style.transition = 'all 0.3s ease';

                            <td><strong>${esc(u.username)}</strong> ${roleBadge(u.role)}</td>
                            <td>${esc(u.email)}</td>
                            <td>${isO ? '<strong>👑 KURUCU</strong>' : (canManage ? `<select onchange="changeRole('${u.id}',this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.35rem;border-radius:6px;font-family:inherit;">${assignableRoles.map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${ROLES[r].name}</option>`).join('')}</select>` : getRoleInfo(u.role).name)}</td>
                            <td>${u.role==='moderator'||u.role==='senior_moderator'||u.role==='chief_moderator'||u.role==='category_mod' ? `<select onchange="changeModCat('${u.id}',this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.35rem;border-radius:6px;font-family:inherit;"><option value="">—</option>${appData.categories.map(c=>`<option value="${c.slug}" ${u.category_mod===c.slug?'selected':''}>${esc(c.name)}</option>`).join('')}</select>` : '—'}</td>
                            <td><span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status==='active'?'Aktif':'Banlı'}</span></td>
                            <td>${isO ? '<span class="badge badge-yellow">Koruma</span>' : (canManage ? `<button class="btn btn-sm ${u.status==='active'?'btn-danger':'btn-success'}" onclick="toggleBan('${u.id}')">${u.status==='active'?'Banla':'Banı Aç'}</button>` : '<span style="color:var(--text-muted);">—</span>')}</td>
                        </tr>`;
                    }).join('')}
                    </tbody></table>
                </div>
            `;
        }

        function changeRole(uid, newRole) {
            const u = appData.users.find(x => x.id === uid);
            if (!u || u.role === 'owner' || !canAddRole(newRole)) return;
            if (getUserLevel(appData.currentUser) <= getUserLevel(u)) { alert('❌ Yetki seviyeniz bu kullanıcıyı yönetmek için yetersiz!'); return; }
            u.role = newRole;
            if (!['moderator','senior_moderator','chief_moderator','category_mod'].includes(newRole)) {
                u.category_mod = null;
                appData.categories.forEach(c => { if(c.moderator_id === uid) c.moderator_id = null; });
            }
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'role_changed', details: `${u.username} -> ${newRole}`, created_at: new Date().toISOString() });
            saveData();
            alert('✅ Kullanıcı rolü güncellendi!');
            renderAdmin();
        }

        function changeModCat(uid, slug) {
            const u = appData.users.find(x => x.id === uid);
            if (!u || !canManageUsers()) return;
            if (u.category_mod) { const old = appData.categories.find(c => c.slug === u.category_mod); if(old) old.moderator_id = null; }
            u.category_mod = slug || null;
            if (slug) { const nc = appData.categories.find(c => c.slug === slug); if(nc) nc.moderator_id = uid; }
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'mod_category_changed', details: `${u.username} -> ${slug||'Kaldırıldı'}`, created_at: new Date().toISOString() });
            saveData();
            alert('✅ Bölüm yetkilisi ataması güncellendi!');
            renderAdmin();
        }

        function toggleBan(uid) {
            if (uid === appData.currentUser.id) { alert('❌ Kendinizi banlayamazsınız!'); return; }
            const u = appData.users.find(x => x.id === uid);
            if (!u || u.role === 'owner' || getUserLevel(appData.currentUser) <= getUserLevel(u)) { alert('❌ Yetkiniz yok!'); return; }
            u.status = u.status === 'active' ? 'banned' : 'active';
            appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: u.status==='banned'?'user_banned':'user_unbanned', details: u.username, created_at: new Date().toISOString() });
            saveData();
            alert(`✅ Kullanıcı ${u.status==='active'?'banı kaldırıldı':'banlandı'}!`);
            renderAdmin();
        }

        function renderTabCats() {
            const tc = document.getElementById('tabContent');
            if (!canManageCategories()) { tc.innerHTML = '<div class="alert alert-danger">Yetkiniz yok.</div>'; return; }
            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Kategoriler</h4>
                <div class="table-wrap" style="margin-top:0.8rem;">
                    <table><thead><tr><th>ID</th><th>Kategori Adı</th><th>Açıklama</th><th>Yetkili</th><th>İlan Sayısı</th></tr></thead><tbody>
                    ${appData.categories.map(c => `<tr><td>#${c.id}</td><td><strong>${esc(c.name)}</strong></td><td>${esc(c.description)}</td><td>${modName(c)?`<span class="badge badge-purple">${esc(modName(c))}</span>`:'<span style="color:var(--text-muted);">Atanmadı</span>'}</td><td><span class="badge badge-blue">${postCount(c.id)}</span></td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
        }

        function renderTabLogs() {
            const tc = document.getElementById('tabContent');
            if (getUserLevel(appData.currentUser) < 90) { tc.innerHTML = '<div class="alert alert-danger">Sadece Chief Admin ve üstü görebilir.</div>'; return; }
            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Son İşlem Kayıtları (${appData.logs.length})</h4>
                <div class="table-wrap" style="margin-top:0.8rem;">
                    <table><thead><tr><th>Tarih</th><th>Kullanıcı</th><th>İşlem</th><th>Detay</th></tr></thead><tbody>
                    ${appData.logs.slice().reverse().slice(0,100).map(l => {
                        const u = appData.users.find(x => x.id === l.user_id);
                        return `<tr><td>${fmtDate(l.created_at)}</td><td>${u?esc(u.username):'Sistem'}</td><td><span class="badge badge-blue">${esc(l.action)}</span></td><td>${esc(l.details)}</td></tr>`;
                    }).join('')}
                    </tbody></table>
                </div>
            `;
        }

        // ==================== AUTH ====================
        function showAuth(type) {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalBox');
            box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 style="margin-bottom:1rem;">${type==='login'?'👋 Giriş Yap':'🎉 Kayıt Ol'}</h3>
                <form onsubmit="${type==='login'?'doLogin(event)':'doRegister(event)'}">
                    <div class="form-group"><label>👤 Kullanıcı Adı</label><input name="username" required minlength="3" placeholder="Kullanıcı adınız"></div>
                    <div class="form-group"><label>📧 E-posta</label><input type="email" name="email" required placeholder="ornek@email.com"></div>
                    <div class="form-group"><label>🔒 Şifre</label><input type="password" name="password" required minlength="6" placeholder="Şifreniz"></div>
                    ${type==='register'?'<div class="form-group"><label>📱 Telefon (İsteğe bağlı)</label><input name="phone" placeholder="5XX XXX XX XX"></div>':''}
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;">${type==='login'?'Giriş Yap':'Kayıt Ol'}</button>
                </form>
                <p style="text-align:center;margin-top:1.2rem;font-size:0.85rem;color:var(--text-muted);">
                    ${type==='login'?'Hesabınız yok mu?':'Hesabınız var mı?'}
                    <a href="#" onclick="showAuth('${type==='login'?'register':'login'}')" style="color:var(--primary-light);font-weight:600;text-decoration:none;">${type==='login'?'Hemen Kayıt Ol':'Giriş Yap'}</a>
                </p>
            `;
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function doLogin(e) {
            e.preventDefault();
            const f = e.target;
            const user = appData.users.find(u => (u.username === f.username.value.trim() || u.email === f.email.value.trim()) && u.password === f.password.value);
            if (!user) { alert('❌ Kullanıcı adı, e-posta veya şifre hatalı!'); return; }
            if (user.status === 'banned') { alert('❌ Hesabınız banlanmış durumda!'); return; }
            user.last_login = new Date().toISOString();
            appData.currentUser = user;
            localStorage.setItem('mp_session', user.id);
            appData.logs.push({ id: genId(), user_id: user.id, action: 'login', details: 'Giriş yapıldı', created_at: new Date().toISOString() });
            saveData();
            closeModal();
            updateHeader();
            showPage('home');
        }

        function doRegister(e) {
            e.preventDefault();
            const f = e.target;
            const uname = f.username.value.trim();
            const email = f.email.value.trim();
            if (appData.users.find(u => u.username === uname)) { alert('❌ Bu kullanıcı adı zaten alınmış!'); return; }
            if (appData.users.find(u => u.email === email)) { alert('❌ Bu e-posta zaten kayıtlı!'); return; }
            const newUser = {
                id: genId(), username: uname, email, password: f.password.value,
                phone: f.phone?.value?.trim() || '', role: 'user', category_mod: null,
                status: 'active', created_at: new Date().toISOString(), last_login: new Date().toISOString()
            };
            appData.users.push(newUser);
            appData.currentUser = newUser;
            localStorage.setItem('mp_session', newUser.id);
            appData.logs.push({ id: genId(), user_id: newUser.id, action: 'register', details: 'Yeni kayıt', created_at: new Date().toISOString() });
            saveData();
            closeModal();
            updateHeader();
            showPage('home');
        }

        function logout() {
            if (appData.currentUser) {
                appData.logs.push({ id: genId(), user_id: appData.currentUser.id, action: 'logout', details: 'Çıkış yapıldı', created_at: new Date().toISOString() });
            }
            appData.currentUser = null;
            localStorage.removeItem('mp_session');
            saveData();
            updateHeader();
            showPage('home');
        }

        // ==================== BAŞLATMA ====================
        window.onclick = function(e) { if (e.target === document.getElementById('modal')) closeModal(); };
        window.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        window.onload = async function() {
            loadData();
            await loadFromJSONBin();
            updateHeader();
            renderHome();
        };
    </script>
</body>
</html>
