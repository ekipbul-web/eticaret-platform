                saveData();
                renderAdmin();
            }
        }

        function renderTabStats() {
            const tc = document.getElementById('tabContent');

            const postsByCat = appData.categories.map(function(c) {
                return { name: c.name, count: postCount(c.id) };
            });
            const maxCount = Math.max.apply(null, postsByCat.map(function(c) { return c.count; }).concat([1]));

            const postsByMonth = {};
            appData.posts.forEach(function(p) {
                const month = new Date(p.created_at).toLocaleDateString('tr-TR', { month: 'short', year: 'numeric' });
                postsByMonth[month] = (postsByMonth[month] || 0) + 1;
            });
            const monthMax = Math.max.apply(null, Object.values(postsByMonth).concat([1]));

            tc.innerHTML = `
                <h4 style="margin-top:1rem;">📈 Kategorilere Göre İlan Dağılımı</h4>
                <div class="chart-bar" style="margin:1rem 0;">
                    ${postsByCat.map(function(c) {
                        return '<div style="flex:1;text-align:center;"><div class="chart-bar-item" style="height:' + (c.count / maxCount * 150) + 'px;"><span class="chart-bar-value">' + c.count + '</span></div><div class="chart-bar-label">' + c.name + '</div></div>';
                    }).join('')}
                </div>

                <h4 style="margin-top:2rem;">📅 Son Aylara Göre İlanlar</h4>
                <div class="chart-bar" style="margin:1rem 0;">
                    ${Object.entries(postsByMonth).slice(-6).map(function(entry) {
                        return '<div style="flex:1;text-align:center;"><div class="chart-bar-item" style="height:' + (entry[1] / monthMax * 150) + 'px;background:linear-gradient(180deg,#10b981,#059669);"><span class="chart-bar-value">' + entry[1] + '</span></div><div class="chart-bar-label">' + entry[0] + '</div></div>';
                    }).join('')}
                </div>

                <div class="stat-row" style="margin-top:2rem;">
                    <div class="stat-box"><div class="stat-label">Toplam Puanlama</div><div class="stat-num">${appData.ratings.length}</div></div>
                    <div class="stat-box"><div class="stat-label">Ortalama Puan</div><div class="stat-num">${appData.ratings.length ? (appData.ratings.reduce(function(s,r){return s+r.rating;},0)/appData.ratings.length).toFixed(1) : '-'}</div></div>
                    <div class="stat-box"><div class="stat-label">Favoriler</div><div class="stat-num">${appData.favorites.length}</div></div>
                    <div class="stat-box"><div class="stat-label">Öne Çıkan</div><div class="stat-num">${appData.featured_posts.length}</div></div>
                </div>
            `;
        }

        function renderTabLogs() {
            const tc = document.getElementById('tabContent');

            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Son İşlem Kayıtları (${appData.logs.length})</h4>
                <div class="table-wrap" style="margin-top:0.8rem;">
                    <table>
                        <thead>
                            <tr><th>Tarih</th><th>Kullanıcı</th><th>İşlem</th><th>Detay</th></tr>
                        </thead>
                        <tbody>
                            ${appData.logs.slice().reverse().slice(0, 100).map(function(l) {
                                const u = appData.users.find(function(x) { return x.id === l.user_id; });
                                return '<tr><td>' + fmtDate(l.created_at) + '</td><td>' + (u ? esc(u.username) : 'Sistem') + '</td><td><span class="badge badge-blue">' + esc(l.action) + '</span></td><td>' + esc(l.details) + '</td></tr>';
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ==================== AUTH ====================
        function showAuth(type) {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalBox');

            box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 style="margin-bottom:0.5rem;">${type === 'login' ? '👋 Giriş Yap' : '🎉 Kayıt Ol'}</h3>
                <form onsubmit="${type === 'login' ? 'doLogin(event)' : 'doRegister(event)'}" style="margin-top:1rem;">
                    <div class="form-group">
                        <label>👤 Kullanıcı Adı</label>
                        <input type="text" name="username" required minlength="3" placeholder="Kullanıcı adınız">
                    </div>
                    <div class="form-group">
                        <label>📧 E-posta</label>
                        <input type="email" name="email" required placeholder="ornek@email.com">
                    </div>
                    <div class="form-group">
                        <label>🔒 Şifre</label>
                        <input type="password" name="password" required minlength="6" placeholder="Şifreniz">
                    </div>
                    ${type === 'register' ? '<div class="form-group"><label>📱 Telefon (İsteğe bağlı)</label><input type="tel" name="phone" placeholder="5XX XXX XX XX"></div>' : ''}
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;">
                        ${type === 'login' ? 'Giriş Yap' : 'Kayıt Ol'}
                    </button>
                </form>
                <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text3);">
                    ${type === 'login'
                        ? '<a href="#" onclick="closeModal();showResetModal();" style="color:var(--dang);text-decoration:none;"><i class="fas fa-key"></i> Şifremi Unuttum</a>'
                        : 'Hesabınız var mı? <a href="#" onclick="showAuth(\'login\')" style="color:var(--pri-light);font-weight:600;text-decoration:none;">Giriş Yap</a>'
                    }
                </p>
            `;

            modal.classList.add('active');
        }

        function showResetModal() {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalBox');

            let step = 1;
            let resetEmail = '';

            function renderStep() {
                if (step === 1) {
                    box.innerHTML = `
                        <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                        <h3 style="display:flex;align-items:center;gap:0.5rem;">
                            <i class="fas fa-lock" style="color:var(--pri);"></i> Şifre Sıfırlama
                        </h3>
                        <p style="color:var(--text3);margin-bottom:1.5rem;font-size:0.88rem;">
                            Kayıtlı e-posta adresinizi girin, size 6 haneli bir kod gönderelim.
                        </p>
                        <form onsubmit="handleResetStep1(event)">
                            <div class="form-group">
                                <label>📧 E-posta Adresiniz</label>
                                <input type="email" name="email" required placeholder="ornek@email.com" autofocus>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
                                <i class="fas fa-paper-plane"></i> Sıfırlama Kodu Gönder
                            </button>
                        </form>
                        <p style="text-align:center;margin-top:1rem;font-size:0.85rem;">
                            <a href="#" onclick="closeModal();showAuth('login');" style="color:var(--pri-light);text-decoration:none;">
                                <i class="fas fa-arrow-left"></i> Giriş sayfasına dön
                            </a>
                        </p>
                    `;
                } else if (step === 2) {
                    box.innerHTML = `
                        <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                        <h3 style="display:flex;align-items:center;gap:0.5rem;">
                            <i class="fas fa-key" style="color:var(--succ);"></i> Kodu Girin
                        </h3>
                        <p style="color:var(--text3);margin-bottom:1rem;font-size:0.88rem;">
                            <strong style="color:var(--text);">${esc(resetEmail)}</strong> adresine 6 haneli bir kod gönderdik.
                        </p>
                        <form onsubmit="handleResetStep2(event)" style="margin-top:1rem;">
                            <div class="form-group">
                                <label>🔑 6 Haneli Kod</label>
                                <input type="text" name="code" required maxlength="6" minlength="6" placeholder="123456" style="font-size:1.6rem;text-align:center;letter-spacing:0.4rem;font-weight:700;" autofocus>
                            </div>
                            <div class="form-group">
                                <label>🔒 Yeni Şifre</label>
                                <input type="password" name="new_password" required minlength="6" placeholder="Yeni şifreniz (en az 6 karakter)">
                            </div>
                            <button type="submit" class="btn btn-success btn-lg" style="width:100%;">
                                <i class="fas fa-check-circle"></i> Şifreyi Güncelle
                            </button>
                        </form>
                    `;
                }
            }

            window.handleResetStep1 = async function(e) {
                e.preventDefault();
                resetEmail = e.target.email.value.trim();
                const sent = await sendResetCode(resetEmail);
                if (sent) {
                    step = 2;
                    renderStep();
                }
            };

            window.handleResetStep2 = function(e) {
                e.preventDefault();
                const code = e.target.code.value.trim();
                const newPass = e.target.new_password.value;

                const data = resetCodes[resetEmail.toLowerCase()];
                if (!data || data.expires < Date.now()) {
                    alert('❌ Kod süresi dolmuş veya geçersiz! Lütfen tekrar kod isteyin.');
                    step = 1;
                    resetEmail = '';
                    renderStep();
                    return;
                }

                if (data.code !== code) {
                    alert('❌ Geçersiz kod! Lütfen tekrar deneyin.');
                    return;
                }

                const user = appData.users.find(u => u.id === data.userId);
                if (!user) {
                    alert('❌ Kullanıcı bulunamadı!');
                    return;
                }

                user.password = newPass;
                delete resetCodes[resetEmail.toLowerCase()];

                appData.logs.push({
                    id: genId(),
                    user_id: user.id,
                    action: 'password_reset',
                    details: 'Şifre sıfırlandı',
                    created_at: new Date().toISOString()
                });

                saveData();
                alert('✅ Şifreniz başarıyla güncellendi! Giriş yapabilirsiniz.');
                closeModal();
                showAuth('login');
            };

            renderStep();
            modal.classList.add('active');
        }

        function showVerifyModal() {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalBox');

            box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 style="margin-bottom:0.5rem;">📧 Email Doğrulama</h3>
                <p style="color:var(--text3);margin-bottom:1rem;font-size:0.88rem;">
                    Email adresinize gönderilen 6 haneli kodu girin.
                </p>
                <form onsubmit="verifyEmail(event)" style="margin-top:1rem;">
                    <div class="form-group">
                        <label>🔑 Doğrulama Kodu</label>
                        <input type="text" name="code" required maxlength="6" minlength="6" placeholder="123456" style="font-size:1.6rem;text-align:center;letter-spacing:0.4rem;font-weight:700;" autofocus>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg" style="width:100%;">
                        <i class="fas fa-check-circle"></i> Doğrula
                    </button>
                </form>
                <p style="text-align:center;margin-top:1rem;font-size:0.82rem;color:var(--text3);">
                    Kod gelmedi mi? <a href="#" onclick="resendVerifyCode()" style="color:var(--pri-light);font-weight:600;">Tekrar Gönder</a>
                </p>
            `;
            modal.classList.add('active');
        }

        function showChangePasswordModal() {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalBox');

            box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 style="display:flex;align-items:center;gap:0.5rem;">
                    <i class="fas fa-key" style="color:var(--pri);"></i> Şifre Değiştir
                </h3>
                <form onsubmit="changePassword(event)" style="margin-top:1rem;">
                    <div class="form-group">
                        <label>🔒 Mevcut Şifre</label>
                        <input type="password" name="old_pass" required placeholder="Mevcut şifreniz">
                    </div>
                    <div class="form-group">
                        <label>🔑 Yeni Şifre</label>
                        <input type="password" name="new_pass" required minlength="6" placeholder="Yeni şifreniz (en az 6 karakter)">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
                        <i class="fas fa-check-circle"></i> Şifreyi Güncelle
                    </button>
                </form>
            `;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('notifDropdown')?.classList.remove('active');
        }

        function doLogin(e) {
            e.preventDefault();
            const form = e.target;
            const username = form.username.value.trim();
            const email = form.email.value.trim();
            const password = form.password.value;

            const user = appData.users.find(function(u) {
                return (u.username === username || u.email === email) && u.password === password;
            });

            if (!user) {
                alert('❌ Kullanıcı adı, e-posta veya şifre hatalı!');
                return;
            }

            if (user.status === 'banned') {
                alert('❌ Hesabınız banlanmış durumda! Yönetici ile iletişime geçin.');
                return;
            }

            user.last_login = new Date().toISOString();
            appData.currentUser = user;
            localStorage.setItem('mp_session', user.id);

            appData.logs.push({
                id: genId(),
                user_id: user.id,
                action: 'login',
                details: 'Giriş yapıldı',
                created_at: new Date().toISOString()
            });

            saveData();
            closeModal();
            updateHeader();
            showPage('home');
        }

        function doRegister(e) {
            e.preventDefault();
            const form = e.target;
            const username = form.username.value.trim();
            const email = form.email.value.trim();
            const password = form.password.value;
            const phone = form.phone ? form.phone.value.trim() : '';

            if (appData.users.find(function(u) { return u.username === username; })) {
                alert('❌ Bu kullanıcı adı zaten alınmış!');
                return;
            }

            if (appData.users.find(function(u) { return u.email === email; })) {
                alert('❌ Bu e-posta adresi zaten kayıtlı!');
                return;
            }

            const newUser = {
                id: genId(),
                username: username,
                email: email,
                password: password,
                phone: phone,
                role: 'user',
                category_mod: null,
                status: 'active',
                email_verified: false,
                bio: '',
                rating: 0,
                total_ratings: 0,
                store_name: username + ' Store',
                store_followers: [],
                created_at: new Date().toISOString(),
                last_login: new Date().toISOString()
            };

            appData.users.push(newUser);
            appData.currentUser = newUser;
            localStorage.setItem('mp_session', newUser.id);

            appData.logs.push({
                id: genId(),
                user_id: newUser.id,
                action: 'register',
                details: 'Yeni kayıt',
                created_at: new Date().toISOString()
            });

            saveData();
            closeModal();
            updateHeader();
            showPage('home');

            sendVerifyCode(email, username).then(function() {
                alert('📧 Doğrulama kodu e-posta adresinize gönderildi! Lütfen email adresinizi doğrulayın.');
                setTimeout(function() {
                    showVerifyModal();
                }, 800);
            });
        }

        function logout() {
            if (appData.currentUser) {
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: 'logout',
                    details: 'Çıkış yapıldı',
                    created_at: new Date().toISOString()
                });
            }

            saveData();
            appData.currentUser = null;
            localStorage.removeItem('mp_session');
            updateHeader();
            showPage('home');
        }

        function verifyEmail(e) {
            e.preventDefault();
            const code = e.target.code.value.trim();
            const email = appData.currentUser.email.toLowerCase();

            const vc = verifyCodes[email];
            if (!vc || vc.expires < Date.now()) {
                alert('❌ Doğrulama kodunun süresi dolmuş! Lütfen tekrar kod isteyin.');
                closeModal();
                return;
            }

            if (vc.code !== code) {
                alert('❌ Hatalı kod! Lütfen tekrar deneyin.');
                return;
            }

            appData.currentUser.email_verified = true;
            const userInList = appData.users.find(x => x.id === appData.currentUser.id);
            if (userInList) {
                userInList.email_verified = true;
            }

            delete verifyCodes[email];
            saveData();
            closeModal();
            updateHeader();
            showPage('profile');
            alert('✅ Email adresiniz başarıyla doğrulandı!');
        }

        function resendVerifyCode() {
            const user = appData.currentUser;
            if (!user) return;

            sendVerifyCode(user.email, user.username).then(function(sent) {
                if (sent) {
                    alert('✅ Yeni doğrulama kodu email adresinize gönderildi!');
                }
            });
        }

        function changePassword(e) {
            e.preventDefault();
            const oldPass = e.target.old_pass.value;
            const newPass = e.target.new_pass.value;

            if (appData.currentUser.password !== oldPass) {
                alert('❌ Mevcut şifre hatalı!');
                return;
            }

            appData.currentUser.password = newPass;
            const userInList = appData.users.find(u => u.id === appData.currentUser.id);
            if (userInList) userInList.password = newPass;

            appData.logs.push({
                id: genId(),
                user_id: appData.currentUser.id,
                action: 'password_changed',
                details: 'Şifre değiştirildi',
                created_at: new Date().toISOString()
            });

            saveData();
            closeModal();
            alert('✅ Şifreniz başarıyla güncellendi!');
        }

        // ==================== GLOBAL FONKSİYONLAR ====================
        window.showPage = showPage;
        window.showAuth = showAuth;
        window.closeModal = closeModal;
        window.showResetModal = showResetModal;
        window.showVerifyModal = showVerifyModal;
        window.showChangePasswordModal = showChangePasswordModal;
        window.toggleNotif = toggleNotif;
        window.markNotifRead = markNotifRead;
        window.searchPosts = searchPosts;
        window.toggleFavorite = toggleFavorite;
        window.addComment = addComment;
        window.deleteComment = deleteComment;
        window.toggleComments = toggleComments;
        window.deletePost = deletePost;
        window.reportPost = reportPost;
        window.toggleFeatured = toggleFeatured;
        window.submitPost = submitPost;
        window.handleImages = handleImages;
        window.removePostImage = removePostImage;
        window.removeAllImages = removeAllImages;
        window.approvePost = approvePost;
        window.changeRole = changeRole;
        window.toggleBan = toggleBan;
        window.resolveReport = resolveReport;
        window.switchTab = switchTab;
        window.doLogin = doLogin;
        window.doRegister = doRegister;
        window.logout = logout;
        window.verifyEmail = verifyEmail;
        window.resendVerifyCode = resendVerifyCode;
        window.changePassword = changePassword;
        window.rateSeller = rateSeller;
        window.highlightStars = highlightStars;
        window.resetStars = resetStars;
        window.sharePost = sharePost;

        // ==================== EVENT LISTENERS ====================
        window.onclick = function(e) {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
            if (!e.target.closest('.notification-dropdown') && !e.target.closest('.btn-icon')) {
                document.getElementById('notifDropdown')?.classList.remove('active');
            }
        };

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // ==================== BAŞLATMA ====================
        window.onload = async function() {
            loadData();
            await loadFromJSONBin();

            const urlParams = new URLSearchParams(window.location.search);
            const verifyToken = urlParams.get('verify');
            const verifyEmail = urlParams.get('email');
            const postParam = urlParams.get('post');

            if (verifyToken && verifyEmail) {
                const decodedEmail = decodeURIComponent(verifyEmail).toLowerCase();
                const vc = verifyCodes[decodedEmail];

                if (vc && vc.token === verifyToken && vc.expires > Date.now()) {
                    const user = appData.users.find(function(u) {
                        return u.email.toLowerCase() === decodedEmail;
                    });

                    if (user) {
                        user.email_verified = true;
                        delete verifyCodes[decodedEmail];
                        saveData();
                        window.history.replaceState({}, document.title, window.location.pathname);

                        document.getElementById('mainContent').innerHTML = `
                            <div style="max-width:500px;margin:3rem auto;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-xl);padding:3rem 2rem;text-align:center;">
                                <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
                                <h1 style="color:var(--succ);">Hesabınız Doğrulandı!</h1>
                                <p style="color:var(--text2);margin:1rem 0;"><strong>${esc(user.username)}</strong>, email adresiniz doğrulandı.</p>
                                <button class="btn btn-primary btn-lg" onclick="showPage('home')">Ana Sayfaya Git</button>
                            </div>
                        `;
                        updateHeader();
                        return;
                    }
                }
            }

            if (postParam) {
                updateHeader();
                showPage('post', postParam);
                return;
            }

            updateHeader();
            renderHome();
        };
    </script>
</body>
</html>
