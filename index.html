    <title>MarketPlace - İlan Platformu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== DEĞİŞKENLER ==================== */
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --card: #181825;
            --card-hover: #1e1e2e;
            --input: #12121a;
            --border: #27273a;
            --border-light: #313148;
            --text: #e8e8f0;
            --text2: #a0a0b8;
            --text3: #6b6b80;
            --pri: #7c3aed;
            --pri-light: #8b5cf6;
            --pri-dark: #6d28d9;
            --pri-glow: rgba(124, 58, 237, 0.3);
            --succ: #10b981;
            --warn: #f59e0b;
            --dang: #ef4444;
            --info: #3b82f6;
            --rad: 10px;
            --rad-lg: 14px;
            --rad-xl: 18px;
            --tr: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== SIFIRLAMA ==================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-light);
        }

        /* ==================== ANİMASYONLAR ==================== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--pri-glow); }
            50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.6); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes countPopup {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes starPulse {
            0%, 100% { transform: scale(1); color: #f59e0b; }
            50% { transform: scale(1.3); color: #fbbf24; }
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ==================== HEADER ==================== */
        .header {
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease-out;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            transition: var(--tr);
        }
        .logo:hover {
            transform: scale(1.03);
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--pri), #a78bfa);
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            animation: pulse 2s infinite;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        /* ==================== BUTONLAR ==================== */
        .btn {
            padding: 0.55rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 500;
            transition: var(--tr);
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--card);
            color: var(--text);
            white-space: nowrap;
            text-decoration: none;
            font-family: inherit;
        }
        .btn:hover {
            border-color: var(--border-light);
            background: var(--card-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--pri), var(--pri-dark));
            border-color: transparent;
            color: white;
            font-weight: 600;
            box-shadow: 0 0 20px var(--pri-glow);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--pri-light), var(--pri));
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--succ), #059669);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
        }
        .btn-danger {
            background: transparent;
            border-color: var(--dang);
            color: var(--dang);
        }
        .btn-danger:hover {
            background: var(--dang);
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        .btn-warning {
            background: transparent;
            border-color: var(--warn);
            color: var(--warn);
        }
        .btn-warning:hover {
            background: var(--warn);
            color: #000;
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text2);
        }
        .btn-ghost:hover {
            color: var(--text);
            background: var(--card);
            border-color: var(--border);
            box-shadow: none;
        }
        .btn-sm {
            padding: 0.35rem 0.8rem;
            font-size: 0.76rem;
            border-radius: 7px;
        }
        .btn-lg {
            padding: 0.75rem 1.8rem;
            font-size: 0.95rem;
            border-radius: 11px;
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            position: relative;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* ==================== HERO ==================== */
        .hero {
            background: linear-gradient(135deg, #181825 0%, #1a1030 30%, #0f1a2e 70%, #181825 100%);
            background-size: 300% 300%;
            animation: gradientShift 10s ease infinite;
            border: 1px solid var(--border);
            border-radius: var(--rad-xl);
            padding: 3.5rem 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .hero > * {
            position: relative;
            z-index: 1;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text2);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #c4b5fd;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        /* ==================== SECTION HEADER ==================== */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ==================== GRID ==================== */
        .grid {
            display: grid;
            gap: 1.2rem;
        }
        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }
        .grid-4 {
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }

        /* ==================== KATEGORİ KARTI ==================== */
        .cat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad-lg);
            padding: 2rem 1.8rem;
            cursor: pointer;
            transition: var(--tr);
            position: relative;
            overflow: hidden;
        }
        .cat-card:hover {
            border-color: var(--pri);
            background: var(--card-hover);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(124, 58, 237, 0.1);
        }
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--pri), var(--pri-light), transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        .cat-card:hover::before {
            transform: scaleX(1);
        }
        .cat-icon {
            width: 52px;
            height: 52px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            background: rgba(124, 58, 237, 0.1);
            color: var(--pri-light);
            transition: var(--tr);
        }
        .cat-card:hover .cat-icon {
            background: linear-gradient(135deg, var(--pri), #a78bfa);
            color: white;
            transform: rotate(5deg) scale(1.1);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
        }
        .cat-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .cat-card .cat-desc {
            color: var(--text3);
            font-size: 0.88rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .cat-card .cat-meta {
            display: flex;
            gap: 0.7rem;
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .cat-card .cat-meta span {
            background: var(--bg);
            padding: 0.3rem 0.7rem;
            border-radius: 7px;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-weight: 500;
        }

        /* ==================== İLAN KARTI ==================== */
        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad-lg);
            padding: 1.4rem;
            cursor: pointer;
            transition: var(--tr);
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            position: relative;
        }
        .post-card:hover {
            border-color: var(--border-light);
            background: var(--card-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }
        .post-card.featured {
            border-color: var(--warn);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }
        .post-card.featured::before {
            content: '⭐ ÖNE ÇIKAN';
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
            font-size: 0.6rem;
            font-weight: 800;
            z-index: 5;
            animation: starPulse 2s infinite;
        }
        .post-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: var(--rad);
            background: var(--bg2);
            transition: var(--tr);
        }
        .post-card:hover .post-image {
            transform: scale(1.02);
        }
        .post-image-placeholder {
            width: 100%;
            height: 190px;
            border-radius: var(--rad);
            background: linear-gradient(135deg, var(--bg2), var(--card));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--text3);
            border: 1px dashed var(--border);
        }
        .post-tag {
            display: inline-block;
            background: rgba(124, 58, 237, 0.1);
            color: var(--pri-light);
            padding: 0.25rem 0.7rem;
            border-radius: 7px;
            font-size: 0.74rem;
            font-weight: 700;
            width: fit-content;
            letter-spacing: 0.02em;
        }
        .post-card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
        }
        .post-card .post-desc {
            color: var(--text2);
            font-size: 0.87rem;
            line-height: 1.6;
            flex: 1;
        }
        .post-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--succ);
        }
        .post-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.78rem;
            color: var(--text3);
            flex-wrap: wrap;
        }
        .post-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .favorite-btn {
            position: absolute;
            top: 0.9rem;
            right: 0.9rem;
            background: rgba(0, 0, 0, 0.55);
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--tr);
            z-index: 5;
            opacity: 0;
        }
        .post-card:hover .favorite-btn {
            opacity: 1;
        }
        .favorite-btn.active {
            color: #f59e0b;
            opacity: 1 !important;
        }
        .vip-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 0.15rem 0.55rem;
            border-radius: 4px;
            font-size: 0.66rem;
            font-weight: 800;
            vertical-align: middle;
        }
        .featured-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            color: white;
            padding: 0.15rem 0.55rem;
            border-radius: 4px;
            font-size: 0.66rem;
            font-weight: 800;
            vertical-align: middle;
            animation: pulse 1.5s infinite;
        }

        /* ==================== YILDIZLAR ==================== */
        .stars {
            display: inline-flex;
            gap: 0.2rem;
        }
        .stars .fa-star {
            color: #f59e0b;
            font-size: 0.9rem;
        }
        .stars .fa-star.empty {
            color: var(--border);
        }
        .star-rating {
            display: inline-flex;
            gap: 0.3rem;
            cursor: pointer;
        }
        .star-rating .fa-star {
            font-size: 1.5rem;
            color: var(--border);
            transition: var(--tr);
        }
        .star-rating .fa-star.active {
            color: #f59e0b;
            animation: starPulse 0.3s ease;
        }
        .star-rating .fa-star:hover {
            color: #fbbf24;
            transform: scale(1.2);
        }

        /* ==================== BADGE ==================== */
        .badge {
            display: inline-block;
            padding: 0.22rem 0.55rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .badge-purple { background: rgba(124, 58, 237, 0.15); color: #c4b5fd; }
        .badge-green { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .badge-yellow { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
        .badge-blue { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
        .badge-orange { background: rgba(249, 115, 22, 0.15); color: #fdba74; }
        .badge-pink { background: rgba(236, 72, 153, 0.15); color: #f9a8d4; }
        .owner-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 0.22rem 0.7rem;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            animation: pulse 2s infinite;
        }
        .trusted-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.22rem 0.7rem;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* ==================== ALERT ==================== */
        .alert {
            padding: 0.9rem 1.2rem;
            border-radius: 9px;
            margin: 0.6rem 0;
            font-size: 0.86rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            border: 1px solid;
        }
        .alert-info { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.25); color: #93c5fd; }
        .alert-success { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.25); color: #6ee7b7; }
        .alert-danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.25); color: #fca5a5; }
        .alert-warning { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.25); color: #fcd34d; }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad-xl);
            padding: 2rem;
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: scaleIn 0.3s ease-out;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--tr);
            font-size: 1rem;
        }
        .modal-close-btn:hover {
            background: var(--dang);
            color: white;
            border-color: var(--dang);
            transform: rotate(90deg);
        }

        /* ==================== FORM ==================== */
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.84rem;
            font-weight: 600;
            margin-bottom: 0.45rem;
            color: var(--text2);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.65rem 0.95rem;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--tr);

                const cat = appData.categories.find(c => c.id === post.category_id);
                if (cat && cat.slug === appData.currentUser.category_mod) return true;
            }
            return false;
        }

        function canModifyComments(post) {
            if (!appData.currentUser) return false;
            if (getUserLevel(appData.currentUser) >= 40) return true;
            if (appData.currentUser.role === 'category_mod' && appData.currentUser.category_mod) {
                const cat = appData.categories.find(c => c.id === post.category_id);
                if (cat && cat.slug === appData.currentUser.category_mod) return true;
            }
            return false;
        }

            return getUserLevel(appData.currentUser) >= 70;
        }

            const myLevel = getUserLevel(appData.currentUser);
            const targetLevel = ROLES[targetRole]?.level || 0;
            return myLevel > targetLevel;
        }

        function canManageCategories() {
            return getUserLevel(appData.currentUser) >= 70;

            appData.notifications.unshift({

                message: message,
                link: link || '',

        // ==================== EMAIL İŞLEMLERİ ====================
        async function sendBrevoEmail(toEmail, toName, subject, htmlContent) {
            try {
                const response = await fetch('https://api.brevo.com/v3/smtp/email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'api-key': BREVO_API_KEY
                    },
                    body: JSON.stringify({
                        sender: {
                            name: BREVO_SENDER_NAME,
                            email: BREVO_SENDER_EMAIL
                        },
                        to: [{ email: toEmail, name: toName }],
                        subject: subject,
                        htmlContent: htmlContent
                    })
                });

                if (response.ok) {
                    console.log('✅ Email gönderildi:', toEmail);
                    return true;
                } else {
                    const error = await response.json();
                    console.error('❌ Email hatası:', error);
                    return false;
                }
            } catch (e) {
                console.error('❌ Email bağlantı hatası:', e);
                return false;
            }
        }

            verifyCodes[email.toLowerCase()] = {

                token: verifyToken,
                expires: Date.now() + 24 * 60 * 60 * 1000

            const siteUrl = window.location.origin + window.location.pathname;

            const html = `

                        <a href="${verifyLink}"

                        </p>
                    </div>

            `;

            const sent = await sendBrevoEmail(email, username, 'MarketPlace - Email Doğrulama', html);

            if (sent) {

        function searchPosts() {
            const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const catId = document.getElementById('searchCat')?.value || '';
            const sort = document.getElementById('searchSort')?.value || 'newest';

            let posts = appData.posts.filter(function(p) { return p.status === 'approved'; });

            if (q) {
                posts = posts.filter(function(p) {
                    return p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
                });
            }

            if (catId) {
                posts = posts.filter(function(p) { return p.category_id === parseInt(catId); });
            }

            if (sort === 'newest') {
                posts.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
            } else if (sort === 'oldest') {
                posts.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
            } else if (sort === 'price_asc') {
                posts.sort(function(a, b) { return a.price - b.price; });
            } else if (sort === 'price_desc') {
                posts.sort(function(a, b) { return b.price - a.price; });
            } else if (sort === 'views') {
                posts.sort(function(a, b) { return (b.views || 0) - (a.views || 0); });
            } else if (sort === 'rating') {
                posts.sort(function(a, b) {
                    const ra = appData.ratings.filter(function(r) { return r.user_id === a.user_id; });
                    const rb = appData.ratings.filter(function(r) { return r.user_id === b.user_id; });
                    const avgA = ra.length ? ra.reduce(function(s, r) { return s + r.rating; }, 0) / ra.length : 0;
                    const avgB = rb.length ? rb.reduce(function(s, r) { return s + r.rating; }, 0) / rb.length : 0;
                    return avgB - avgA;
                });
            }

            const container = document.getElementById('postsContainer');
            if (container) {
                container.innerHTML = renderPostCards(posts) || '<div class="alert alert-info" style="grid-column:1/-1;"><i class="fas fa-search"></i> Sonuç bulunamadı.</div>';
            }
        }

        function renderPostCards(posts) {
            if (!posts || posts.length === 0) {
                return '<div class="alert alert-info" style="grid-column:1/-1;"><i class="fas fa-info-circle"></i> Henüz ilan bulunmamaktadır.</div>';
            }

            return posts.map(function(p, i) {
                const cat = appData.categories.find(function(c) { return c.id === p.category_id; });
                const user = appData.users.find(function(u) { return u.id === p.user_id; });
                const isFeatured = appData.featured_posts.includes(p.id);

                let isFav = false;
                if (appData.currentUser) {
                    isFav = appData.favorites.some(function(f) {
                        return f.user_id === appData.currentUser.id && f.post_id === p.id;
                    });
                }

                const ratings = appData.ratings.filter(function(r) { return r.user_id === p.user_id; });
                const avgRating = ratings.length ? (ratings.reduce(function(s, r) { return s + r.rating; }, 0) / ratings.length) : 0;

                return `
                    <div class="post-card${isFeatured ? ' featured' : ''}" style="animation: fadeInUp 0.45s ease ${i * 0.08}s both;" onclick="showPage('post', '${p.id}')">
                        ${p.images && p.images.length > 0
                            ? '<img src="' + p.images[0] + '" class="post-image" alt="" loading="lazy">'
                            : '<div class="post-image-placeholder"><i class="fas fa-image"></i></div>'
                        }
                        <button class="favorite-btn${isFav ? ' active' : ''}" onclick="event.stopPropagation();toggleFavorite('${p.id}')">
                            <i class="fas fa-star"></i>
                        </button>
                        <span class="post-tag">${cat ? esc(cat.name) : 'Kategori'}</span>
                        <h3>${esc(p.title)}${p.vip ? ' <span class="vip-badge">VIP</span>' : ''}${isFeatured ? ' <span class="featured-badge">ÖNE ÇIKAN</span>' : ''}</h3>
                        <p class="post-desc">${esc(trunc(p.description, 100))}</p>
                        ${p.price > 0 ? '<div class="post-price">₺' + parseFloat(p.price).toFixed(2) + '</div>' : ''}
                        <div class="post-meta">
                            <span><i class="fas fa-user-circle"></i> ${user ? esc(user.username) : 'Anonim'}</span>
                            ${avgRating > 0 ? '<span><div class="stars">' + [1,2,3,4,5].map(function(s) { return s <= Math.round(avgRating) ? '<i class="fas fa-star"></i>' : '<i class="fas fa-star empty"></i>'; }).join('') + '</div> (' + ratings.length + ')</span>' : ''}
                            <span><i class="fas fa-comment"></i> ${appData.comments.filter(function(c) { return c.post_id === p.id; }).length}</span>
                            <span><i class="fas fa-eye"></i> ${p.views || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleFavorite(postId) {
            if (!appData.currentUser) {
                alert('❌ Favorilere eklemek için giriş yapmalısınız!');
                return;
            }

            const idx = appData.favorites.findIndex(function(f) {
                return f.user_id === appData.currentUser.id && f.post_id === postId;
            });

            if (idx >= 0) {
                appData.favorites.splice(idx, 1);
            } else {
                appData.favorites.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    post_id: postId,
                    created_at: new Date().toISOString()
                });
            }

            saveData();

            if (appData.currentPage === 'favorites') {
                showPage('favorites');
            } else if (appData.currentPage === 'post') {
                showPage('post', postId);
            } else {
                showPage(appData.currentPage || 'home');
            }
        }

        // ==================== İLAN DETAY ====================
        function renderPostDetail(postId) {
            const main = document.getElementById('mainContent');
            const post = appData.posts.find(function(p) { return p.id === postId; });

            if (!post) {
                renderHome();
                return;
            }

            post.views = (post.views || 0) + 1;
            saveData();

            const cat = appData.categories.find(function(c) { return c.id === post.category_id; });
            const user = appData.users.find(function(u) { return u.id === post.user_id; });

            const comments = appData.comments
                .filter(function(c) { return c.post_id === postId; })
                .sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });

            const canMod = canModifyComments(post);
            const canDel = canDeletePost(post);

            let isFav = false;
            if (appData.currentUser) {
                isFav = appData.favorites.some(function(f) {

            const ratings = appData.ratings.filter(function(r) { return r.user_id === post.user_id; });
            const avgRating = ratings.length ? (ratings.reduce(function(s, r) { return s + r.rating; }, 0) / ratings.length) : 0;
            const myRating = appData.currentUser ? appData.ratings.find(function(r) { return r.user_id === post.user_id && r.rater_id === appData.currentUser.id; }) : null;

            main.innerHTML = `
                <button class="btn btn-ghost btn-sm" onclick="showPage('category', '${cat ? cat.slug : ''}')" style="margin-bottom:1rem;">
                    <i class="fas fa-arrow-left"></i> ${cat ? esc(cat.name) + ' kategorisine dön' : 'Geri'}

                <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:2rem;">

                            <button class="btn btn-sm ${isFav ? 'btn-warning' : 'btn-ghost'}" onclick="toggleFavorite('${post.id}')">
                                <i class="fas fa-star"></i> ${isFav ? 'Favoriden Çıkar' : 'Favorilere Ekle'}
                            </button>
                            ${canDel ? '<button class="btn btn-danger btn-sm" onclick="deletePost(\'' + post.id + '\')"><i class="fas fa-trash"></i> Sil</button>' : ''}
                            ${isAdmin() ? '<button class="btn btn-sm ' + (appData.featured_posts.includes(post.id) ? 'btn-warning' : 'btn-success') + '" onclick="toggleFeatured(\'' + post.id + '\')"><i class="fas fa-star"></i> ' + (appData.featured_posts.includes(post.id) ? 'Öne Çıkarmayı Kaldır' : 'Öne Çıkar') + '</button>' : ''}
                            ${appData.currentUser ? '<button class="btn btn-warning btn-sm" onclick="reportPost(\'' + post.id + '\')"><i class="fas fa-flag"></i> Şikayet Et</button>' : ''}
                        </div>
                    </div>

                    <!-- Açıklama -->
                    <div style="background:var(--bg);padding:1.5rem;border-radius:10px;margin:1rem 0;white-space:pre-wrap;line-height:1.8;">
                        ${esc(post.description)}

                    <!-- Fiyat -->
                    ${post.price > 0 ? '<p style="font-size:1.8rem;font-weight:800;color:var(--succ);">₺' + parseFloat(post.price).toFixed(2) + '</p>' : ''}

                    <!-- Satıcı Bilgisi ve Puanlama -->
                    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin:1rem 0;">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
                            <div>
                                <h4>👤 ${user ? esc(user.username) : 'Anonim'} ${user ? roleBadge(user.role) : ''}</h4>
                                ${avgRating > 0
                                    ? '<div style="display:flex;align-items:center;gap:0.5rem;"><div class="stars">' + [1,2,3,4,5].map(function(s) { return s <= Math.round(avgRating) ? '<i class="fas fa-star"></i>' : '<i class="fas fa-star empty"></i>'; }).join('') + '</div><span style="color:var(--text2);">' + avgRating.toFixed(1) + ' (' + ratings.length + ' değerlendirme)</span></div>'
                                    : '<span style="color:var(--text3);">Henüz değerlendirme yok</span>'
                                }
                                ${user && user.store_name ? '<p style="margin-top:0.5rem;"><i class="fas fa-store"></i> ' + esc(user.store_name) + ' | ' + (user.store_followers || []).length + ' takipçi</p>' : ''}
                            </div>
                            ${appData.currentUser && appData.currentUser.id !== post.user_id ? `
                            <div style="text-align:center;">
                                <p style="font-size:0.8rem;color:var(--text3);margin-bottom:0.3rem;">Satıcıyı Değerlendir</p>
                                <div class="star-rating" id="starRating">
                                    ${[1,2,3,4,5].map(function(s) {
                                        return '<i class="fas fa-star' + (myRating && myRating.rating >= s ? ' active' : '') + '" onclick="rateSeller(\'' + post.user_id + '\', ' + s + ')" onmouseover="highlightStars(' + s + ')" onmouseout="resetStars(' + (myRating ? myRating.rating : 0) + ')"></i>';
                                    }).join('')}
                                </div>
                            </div>` : ''}
                        </div>
                    </div>

                    <!-- Sosyal Paylaşım -->
                    <div style="margin:1rem 0;">
                        <p style="font-size:0.8rem;color:var(--text3);margin-bottom:0.5rem;">📤 Paylaş:</p>
                        <div class="share-buttons">
                            <button class="share-btn whatsapp" onclick="sharePost('whatsapp','${post.id}')"><i class="fab fa-whatsapp"></i></button>
                            <button class="share-btn telegram" onclick="sharePost('telegram','${post.id}')"><i class="fab fa-telegram"></i></button>
                            <button class="share-btn twitter" onclick="sharePost('twitter','${post.id}')"><i class="fab fa-twitter"></i></button>
                            <button class="share-btn facebook" onclick="sharePost('facebook','${post.id}')"><i class="fab fa-facebook"></i></button>
                            <button class="share-btn copy" onclick="sharePost('copy','${post.id}')"><i class="fas fa-link"></i></button>

                    <!-- İletişim -->
                    <div style="background:var(--bg2);border:1px solid var(--border);padding:1.5rem;border-radius:10px;margin:1rem 0;">

                        <span><i class="fas fa-eye"></i> ${post.views || 0} görüntülenme</span>

                    <!-- Yorumlar -->
                    <div class="comment-section">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
                            <h4>💬 Yorumlar (${comments.length})</h4>
                            ${canMod
                                ? '<button class="btn btn-sm ' + (post.comments_locked ? 'btn-success' : 'btn-warning') + '" onclick="toggleComments(\'' + post.id + '\')"><i class="fas fa-' + (post.comments_locked ? 'lock-open' : 'lock') + '"></i> ' + (post.comments_locked ? 'Yorumları Aç' : 'Yorumları Kilitle') + '</button>'
                                : ''
                            }
                        </div>

                        <!-- Yorum formu -->
                        ${!post.comments_locked && appData.currentUser && isVerified()
                            ? '<form onsubmit="addComment(event, \'' + post.id + '\')" style="display:flex;gap:0.5rem;margin-bottom:1rem;"><input type="text" name="comment_text" required placeholder="Yorumunuzu yazın..." style="flex:1;padding:0.7rem;background:var(--input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;"><button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-paper-plane"></i> Gönder</button></form>'
                            : (post.comments_locked
                                ? '<div class="alert alert-danger"><i class="fas fa-lock"></i> Yorumlar yetkili tarafından kilitlenmiş.</div>'
                                : (!appData.currentUser
                                    ? '<div class="alert alert-info"><i class="fas fa-info-circle"></i> Yorum yapmak için <a href="#" onclick="showAuth(\'login\')" style="color:var(--pri-light);font-weight:600;">giriş yapın</a>.</div>'
                                    : '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle"></i> Email doğrulaması yapmadan yorum yapamazsınız.</div>'
                                )
                            )
                        }

                        <!-- Yorum listesi -->
                        ${comments.map(function(c) {
                            const cu = appData.users.find(function(u) { return u.id === c.user_id; });
                            return `
                                <div class="comment">
                                    <div class="comment-header">
                                        <span class="comment-user">
                                            ${cu ? esc(cu.username) : 'Anonim'}
                                            ${cu ? roleBadge(cu.role) : ''}
                                        </span>
                                        <span class="comment-date">${fmtDate(c.created_at)}</span>
                                    </div>
                                    <p class="comment-text">${esc(c.text)}</p>
                                    ${(canMod || (appData.currentUser && c.user_id === appData.currentUser.id))
                                        ? '<div class="comment-actions"><button class="btn btn-danger btn-sm" onclick="deleteComment(\'' + c.id + '\', \'' + post.id + '\')"><i class="fas fa-trash"></i> Sil</button></div>'
                                        : ''
                                    }
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function addComment(e, postId) {
            e.preventDefault();

            if (!appData.currentUser || !isVerified()) {
                alert('❌ Yorum yapmak için email doğrulaması gereklidir!');
                return;
            }

            const text = e.target.comment_text.value.trim();
            if (!text) return;

            const post = appData.posts.find(function(p) { return p.id === postId; });
            if (!post || post.comments_locked) return;

            appData.comments.push({
                id: genId(),
                post_id: postId,
                user_id: appData.currentUser.id,
                text: text,
                created_at: new Date().toISOString()
            });

            if (post.user_id !== appData.currentUser.id) {
                addNotification(post.user_id, 'comment', 'İlanınıza yeni bir yorum yapıldı: ' + post.title, '');
            }

            saveData();
            showPage('post', postId);
        }

        function deleteComment(commentId, postId) {
            if (!confirm('Bu yorumu silmek istediğinize emin misiniz?')) return;

            const idx = appData.comments.findIndex(function(c) { return c.id === commentId; });
            if (idx >= 0) {
                appData.comments.splice(idx, 1);
                saveData();
                showPage('post', postId);
            }
        }

        function toggleComments(postId) {
            const post = appData.posts.find(function(p) { return p.id === postId; });
            if (!post || !canModifyComments(post)) return;

            post.comments_locked = !post.comments_locked;

            appData.logs.push({
                id: genId(),
                user_id: appData.currentUser.id,
                action: post.comments_locked ? 'comments_locked' : 'comments_unlocked',
                details: 'İlan: ' + post.title,
                created_at: new Date().toISOString()
            });

            saveData();
            showPage('post', postId);
        }

        function deletePost(postId) {
            if (!confirm('Bu ilanı silmek istediğinize emin misiniz? Bu işlem geri alınamaz!')) return;

            const post = appData.posts.find(function(p) { return p.id === postId; });
            if (!post || !canDeletePost(post)) {
                alert('❌ Bu işlem için yetkiniz yok!');
                return;
            }

            appData.posts = appData.posts.filter(function(p) { return p.id !== postId; });
            appData.comments = appData.comments.filter(function(c) { return c.post_id !== postId; });
            appData.featured_posts = appData.featured_posts.filter(function(id) { return id !== postId; });

            appData.logs.push({
                id: genId(),
                user_id: appData.currentUser.id,
                action: 'post_deleted',
                details: 'İlan: ' + post.title,
                created_at: new Date().toISOString()
            });

            if (post.user_id !== appData.currentUser.id) {
                addNotification(post.user_id, 'post_deleted', 'İlanınız yönetici tarafından silindi: ' + post.title, '');
            }

            saveData();
            alert('✅ İlan başarıyla silindi.');
            showPage('home');
        }

        function reportPost(postId) {
            if (!appData.currentUser) {
                showAuth('login');
                return;
            }

            const reason = prompt('Şikayet sebebinizi yazın:');
            if (!reason || !reason.trim()) return;

            appData.reports.push({
                id: genId(),
                post_id: postId,
                user_id: appData.currentUser.id,
                reason: reason.trim(),
                status: 'pending',
                created_at: new Date().toISOString()
            });

            saveData();
            alert('✅ Şikayetiniz alındı. Yetkililer en kısa sürede inceleyecektir.');
        }

        function toggleFeatured(postId) {
            if (!isAdmin()) return;

            const idx = appData.featured_posts.indexOf(postId);
            if (idx >= 0) {
                appData.featured_posts.splice(idx, 1);
                alert('✅ Öne çıkarma kaldırıldı.');
            } else {
                appData.featured_posts.unshift(postId);
                alert('✅ İlan öne çıkarıldı!');
            }

            saveData();
            showPage('post', postId);
        }

        // ==================== PUANLAMA ====================
        function rateSeller(userId, rating) {
            if (!appData.currentUser) {
                alert('❌ Giriş yapmalısınız!');
                return;
            }

            if (appData.currentUser.id === userId) {
                alert('❌ Kendinizi puanlayamazsınız!');
                return;
            }

            const existing = appData.ratings.find(function(r) {
                return r.user_id === userId && r.rater_id === appData.currentUser.id;
            });

            if (existing) {
                existing.rating = rating;
                existing.updated_at = new Date().toISOString();
            } else {
                appData.ratings.push({
                    id: genId(),
                    user_id: userId,
                    rater_id: appData.currentUser.id,
                    rating: rating,
                    created_at: new Date().toISOString()
                });
            }

            const ratings = appData.ratings.filter(function(r) { return r.user_id === userId; });
            const avg = ratings.reduce(function(s, r) { return s + r.rating; }, 0) / ratings.length;

            const user = appData.users.find(function(u) { return u.id === userId; });
            if (user) {
                user.rating = Math.round(avg * 10) / 10;
                user.total_ratings = ratings.length;
            }

            addNotification(userId, 'rating', appData.currentUser.username + ' size ' + rating + ' yıldız verdi!');
            saveData();
            alert('✅ ' + rating + ' yıldız verdiniz!');
            showPage('post', appData.currentParam);
        }

        function highlightStars(count) {
            document.querySelectorAll('#starRating .fa-star').forEach(function(star, i) {
                star.classList.toggle('active', i < count);
            });
        }

        function resetStars(currentRating) {
            document.querySelectorAll('#starRating .fa-star').forEach(function(star, i) {
                star.classList.toggle('active', i < currentRating);
            });
        }

        // ==================== SOSYAL PAYLAŞIM ====================
        function sharePost(platform, postId) {
            const post = appData.posts.find(function(p) { return p.id === postId; });
            if (!post) return;

            const url = encodeURIComponent(window.location.origin + window.location.pathname + '?post=' + postId);
            const text = encodeURIComponent(post.title + ' - ₺' + post.price + ' | MarketPlace');

            let shareUrl = '';

            switch (platform) {
                case 'whatsapp':
                    shareUrl = 'https://wa.me/?text=' + text + '%20' + url;
                    break;
                case 'telegram':
                    shareUrl = 'https://t.me/share/url?url=' + url + '&text=' + text;
                    break;
                case 'twitter':
                    shareUrl = 'https://twitter.com/intent/tweet?text=' + text + '&url=' + url;
                    break;
                case 'facebook':
                    shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + url;
                    break;
                case 'copy':
                    navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?post=' + postId)
                        .then(function() { alert('🔗 Link kopyalandı!'); });
                    return;
            }

            if (shareUrl) {
                window.open(shareUrl, '_blank', 'width=600,height=400');
            }
        }

        // ==================== İLAN VERME ====================
        function renderNewPost() {
            if (!appData.currentUser) {
                showAuth('login');
                return;
            }

            if (!isVerified()) {
                alert('❌ İlan vermek için email adresinizi doğrulamanız gereklidir!');
                showPage('profile');
                return;
            }

            const main = document.getElementById('mainContent');

            main.innerHTML = `
                <div style="max-width:650px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:2.5rem;">
                    <h1 style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1.5rem;">
                        <i class="fas fa-plus-circle" style="color:var(--pri);"></i> Yeni İlan Ver
                    </h1>

                    <form id="postForm" onsubmit="submitPost(event)">
                        <div class="form-group">
                            <label>📂 Kategori *</label>
                            <select name="category_id" required>
                                <option value="">Kategori seçiniz</option>
                                ${appData.categories.map(function(c) { return '<option value="' + c.id + '">' + esc(c.name) + '</option>'; }).join('')}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>📝 İlan Başlığı *</label>
                            <input type="text" name="title" required maxlength="200" placeholder="Örn: Rp Grand Mobile Satılık Hesap">
                        </div>

                        <div class="form-group">
                            <label>📄 Açıklama *</label>
                            <textarea name="description" required placeholder="İlan detaylarını, ürün özelliklerini yazın..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>🖼️ Fotoğraflar (En fazla 5 adet)</label>
                            <div class="image-upload-area" id="imgArea" onclick="document.getElementById('imgInput').click()">
                                <i class="fas fa-cloud-upload-alt" style="font-size:2rem;color:var(--text3);"></i>
                                <p style="margin-top:0.5rem;color:var(--text3);">Fotoğraf yüklemek için tıklayın</p>
                                <p style="font-size:0.75rem;color:var(--text3);">Maksimum 5MB, otomatik sıkıştırılır</p>
                            </div>
                            <input type="file" id="imgInput" accept="image/*" multiple style="display:none;" onchange="handleImages(event)">
                            <div class="image-gallery" id="imgGallery"></div>
                            <button type="button" class="btn btn-ghost btn-sm" id="removeAllImagesBtn" style="display:none;margin-top:0.5rem;" onclick="removeAllImages()">
                                <i class="fas fa-times"></i> Tüm Fotoğrafları Kaldır
                            </button>
                        </div>

                        <div class="form-group">
                            <label>💰 Fiyat (₺)</label>
                            <input type="number" name="price" step="0.01" min="0" placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label>📧 İletişim E-posta</label>
                            <input type="email" name="contact_email" placeholder="ornek@email.com">
                        </div>

                        <div class="form-group">
                            <label>📱 İletişim Telefon</label>
                            <input type="tel" name="contact_phone" placeholder="5XX XXX XX XX">
                        </div>

                        <div class="form-group">
                            <label>🎮 Discord</label>
                            <input type="text" name="contact_discord" placeholder="kullanici#1234">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;">
                            <i class="fas fa-paper-plane"></i> İlanı Gönder
                        </button>
                    </form>
                </div>
            `;

            window._postImages = [];
        }

        async function handleImages(e) {
            const files = Array.from(e.target.files).slice(0, 5);
            const images = [];

            for (const file of files) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('❌ ' + file.name + ' dosyası 5MB\'dan büyük! Atlanıyor.');
                    continue;
                }
                const reader = new FileReader();
                const dataUrl = await new Promise(function(resolve) {
                    reader.onload = function(e) { resolve(e.target.result); };
                    reader.readAsDataURL(file);
                });
                images.push(dataUrl);
            }

            window._postImages = images;

            const gallery = document.getElementById('imgGallery');
            if (gallery) {
                gallery.innerHTML = images.map(function(img, i) {
                    return '<img src="' + img + '" onclick="removePostImage(' + i + ')" title="Kaldırmak için tıkla">';
                }).join('');
            }

            const area = document.getElementById('imgArea');
            const removeBtn = document.getElementById('removeAllImagesBtn');
            if (area) area.classList.toggle('has-image', images.length > 0);
            if (removeBtn) removeBtn.style.display = images.length > 0 ? 'inline-flex' : 'none';
        }

        function removePostImage(index) {
            window._postImages.splice(index, 1);

            const gallery = document.getElementById('imgGallery');
            if (gallery) {
                gallery.innerHTML = window._postImages.map(function(img, i) {
                    return '<img src="' + img + '" onclick="removePostImage(' + i + ')" title="Kaldırmak için tıkla">';
                }).join('');
            }

            const area = document.getElementById('imgArea');
            const removeBtn = document.getElementById('removeAllImagesBtn');
            if (area) area.classList.toggle('has-image', window._postImages.length > 0);
            if (removeBtn) removeBtn.style.display = window._postImages.length > 0 ? 'inline-flex' : 'none';
        }

        function removeAllImages() {
            window._postImages = [];
            document.getElementById('imgGallery').innerHTML = '';
            document.getElementById('imgArea').classList.remove('has-image');
            document.getElementById('removeAllImagesBtn').style.display = 'none';
            document.getElementById('imgInput').value = '';
        }

        function submitPost(e) {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);

            const post = {
                id: genId(),

            const reportsPending = appData.reports.filter(function(r) { return r.status === 'pending'; }).length;

            main.innerHTML = `
                <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:2.5rem;">

                    <div id="tabContent"></div>

            `;

            renderTabDash();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.admin-tab').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');

            const tc = document.getElementById('tabContent');
            tc.style.opacity = '0';
            tc.style.transform = 'translateY(10px)';

            setTimeout(function() {
                switch (tab) {
                    case 'dash':    renderTabDash(); break;
                    case 'approve': renderTabApprove(); break;
                    case 'users':   renderTabUsers(); break;
                    case 'cats':    renderTabCats(); break;
                    case 'reports': renderTabReports(); break;
                    case 'stats':   renderTabStats(); break;
                    case 'logs':    renderTabLogs(); break;
                }
                tc.style.opacity = '1';
                tc.style.transform = 'translateY(0)';
                tc.style.transition = 'all 0.3s ease';
            }, 150);
        }

        function renderTabApprove() {
            const tc = document.getElementById('tabContent');
            if (!canApprove()) {
                tc.innerHTML = '<div class="alert alert-danger"><i class="fas fa-lock"></i> Bu sayfaya erişim yetkiniz yok.</div>';
                return;
            }

            if (appData.currentUser.role === 'category_mod' && appData.currentUser.category_mod) {
                const cat = appData.categories.find(function(c) { return c.slug === appData.currentUser.category_mod; });
                if (cat) {
                    pending = pending.filter(function(p) { return p.category_id === cat.id; });
                }
            }

            pending.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });

            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Bekleyen İlanlar (${pending.length})</h4>
                ${pending.length === 0
                    ? '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Bekleyen ilan bulunmamaktadır.</div>'
                    : pending.map(function(p) {
                        const cat = appData.categories.find(function(c) { return c.id === p.category_id; });
                        const user = appData.users.find(function(u) { return u.id === p.user_id; });
                        return `
                            <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin:0.8rem 0;">

                                        ${p.images && p.images[0] ? '<img src="' + p.images[0] + '" style="max-width:200px;max-height:150px;border-radius:8px;margin:0.5rem 0;" alt="">' : ''}
                                        <p style="color:var(--text2);white-space:pre-wrap;font-size:0.9rem;">${esc(p.description)}</p>
                                        ${p.price > 0 ? '<p style="color:var(--succ);font-weight:700;">₺' + parseFloat(p.price).toFixed(2) + '</p>' : ''}
                                        <small style="color:var(--text3);">Satıcı: ${user ? esc(user.username) : 'Anonim'} &bull; ${fmtDate(p.created_at)}</small>

        function approvePost(postId, action) {
            const post = appData.posts.find(function(p) { return p.id === postId; });
            if (!post || !canApprove()) return;

            post.status = action === 'approve' ? 'approved' : 'rejected';
            post.approved_by = appData.currentUser.id;
            post.approved_at = new Date().toISOString();

            addNotification(
                post.user_id,
                'post_' + action + 'd',
                'İlanınız ' + (action === 'approve' ? 'onaylandı' : 'reddedildi') + ': ' + post.title,
                ''
            );

            appData.logs.push({
                id: genId(),
                user_id: appData.currentUser.id,
                action: 'post_' + action + 'd',
                details: 'İlan: ' + post.title,
                created_at: new Date().toISOString()
            });

            saveData();
            alert('✅ İlan ' + (action === 'approve' ? 'onaylandı' : 'reddedildi') + '!');
            renderAdmin();
        }

            const tc = document.getElementById('tabContent');
            if (!canManageUsers()) {
                tc.innerHTML = '<div class="alert alert-danger"><i class="fas fa-lock"></i> Bu sayfaya erişim yetkiniz yok.</div>';
                return;
            }

            const myLevel = getUserLevel(appData.currentUser);
            const assignableRoles = Object.entries(ROLES)
                .filter(function(entry) { return entry[1].level < myLevel && entry[0] !== 'owner'; })
                .map(function(entry) { return entry[0]; });

            tc.innerHTML = `
                <h4 style="margin-top:1rem;">Kullanıcı Listesi (${appData.users.length})</h4>
                <div class="table-wrap" style="margin-top:0.8rem;">
                    <table>

                        </thead>
                        <tbody>
                            ${appData.users.map(function(u) {
                                const ratings = appData.ratings.filter(function(r) { return r.user_id === u.id; });
                                const avg = ratings.length ? (ratings.reduce(function(s,r) { return s+r.rating; }, 0) / ratings.length).toFixed(1) : '-';
                                const isOwnerAccount = u.role === 'owner';
                                const canManage = !isOwnerAccount && getUserLevel(appData.currentUser) > getUserLevel(u);
                                return `
                                    <tr>
                                        <td><strong>${esc(u.username)}</strong> ${roleBadge(u.role)}</td>
                                        <td>${esc(u.email)}</td>
                                        <td>
                                            ${isOwnerAccount
                                                ? '<strong>👑 KURUCU</strong>'
                                                : (canManage
                                                    ? '<select onchange="changeRole(\'' + u.id + '\', this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.3rem;border-radius:6px;font-family:inherit;">' +
                                                      assignableRoles.map(function(r) { return '<option value="' + r + '" ' + (u.role === r ? 'selected' : '') + '>' + ROLES[r].name + '</option>'; }).join('') +
                                                      '</select>'
                                                    : getRoleInfo(u.role).name
                                                )
                                            }
                                        </td>
                                        <td>${avg} ⭐ (${ratings.length})</td>
                                        <td><span class="badge ${u.status === 'active' ? 'badge-green' : 'badge-red'}">${u.status === 'active' ? 'Aktif' : 'Banlı'}</span></td>
                                        <td>
                                            ${isOwnerAccount
                                                ? '<span class="badge badge-yellow">Korunuyor</span>'
                                                : (canManage
                                                    ? '<button class="btn btn-sm ' + (u.status === 'active' ? 'btn-danger' : 'btn-success') + '" onclick="toggleBan(\'' + u.id + '\')">' + (u.status === 'active' ? 'Banla' : 'Banı Aç') + '</button>'
                                                    : '<span style="color:var(--text3);">—</span>'
                                                )
                                            }
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function changeRole(userId, newRole) {
            const user = appData.users.find(function(u) { return u.id === userId; });
            if (!user || user.role === 'owner' || !canAddRole(newRole)) return;
            if (getUserLevel(appData.currentUser) <= getUserLevel(user)) {
                alert('❌ Yetki seviyeniz bu kullanıcıyı yönetmek için yetersiz!');
                return;
            }

            user.role = newRole;

            if (!['moderator', 'senior_moderator', 'chief_moderator', 'category_mod'].includes(newRole)) {
                user.category_mod = null;
                appData.categories.forEach(function(c) {
                    if (c.moderator_id === userId) c.moderator_id = null;
                });
            }

            appData.logs.push({
                id: genId(),
                user_id: appData.currentUser.id,
                action: 'role_changed',
                details: user.username + ' -> ' + newRole,
                created_at: new Date().toISOString()
            });

            saveData();
            alert('✅ Kullanıcı rolü güncellendi!');
            renderAdmin();
        }

        function toggleBan(userId) {
            if (userId === appData.currentUser.id) {
                alert('❌ Kendinizi banlayamazsınız!');
                return;
            }

            const user = appData.users.find(function(u) { return u.id === userId; });
            if (!user || user.role === 'owner' || getUserLevel(appData.currentUser) <= getUserLevel(user)) {
                alert('❌ Yetkiniz yok!');
                return;
            }

            user.status = user.status === 'active' ? 'banned' : 'active';

            appData.logs.push({
                id: genId(),
                user_id: appData.currentUser.id,
                action: user.status === 'banned' ? 'user_banned' : 'user_unbanned',
                details: 'Kullanıcı: ' + user.username,
                created_at: new Date().toISOString()
            });

            saveData();
            alert('✅ Kullanıcı ' + (user.status === 'active' ? 'banı kaldırıldı' : 'banlandı') + '!');
            renderAdmin();
        }

                    }).join('')
                }

        function resolveReport(reportId) {
            const report = appData.reports.find(function(r) { return r.id === reportId; });
            if (report) {
