<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MarketPlace - İlan Platformu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --card: #181825;
            --card-hover: #1e1e2e;
            --input: #12121a;
            --border: #27273a;
            --border-light: #313148;
            --text: #e8e8f0;
            --text2: #a0a0b8;
            --text3: #6b6b80;
            --pri: #7c3aed;
            --pri-light: #8b5cf6;
            --pri-dark: #6d28d9;
            --pri-glow: rgba(124,58,237,0.3);
            --succ: #10b981;
            --warn: #f59e0b;
            --dang: #ef4444;
            --info: #3b82f6;
            --rad: 10px;
            --rad-lg: 14px;
            --rad-xl: 18px;
            --tr: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-light);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 20px var(--pri-glow);
            }
            50% {
                box-shadow: 0 0 40px rgba(124, 58, 237, 0.6);
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes bellShake {
            0%,
            100% {
                transform: rotate(0);
            }
            25% {
                transform: rotate(15deg);
            }
            75% {
                transform: rotate(-15deg);
            }
        }
        @keyframes countPopup {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.5);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* Header */
        .header {
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease-out;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            transition: var(--tr);
        }
        .logo:hover {
            transform: scale(1.03);
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--pri), #a78bfa);
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            animation: pulse 2s infinite;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 0.55rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 500;
            transition: var(--tr);
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--card);
            color: var(--text);
            white-space: nowrap;
            text-decoration: none;
            font-family: inherit;
        }
        .btn:hover {
            border-color: var(--border-light);
            background: var(--card-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--pri), var(--pri-dark));
            border-color: transparent;
            color: white;
            font-weight: 600;
            box-shadow: 0 0 20px var(--pri-glow);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--pri-light), var(--pri));
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--succ), #059669);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
        }
        .btn-danger {
            background: transparent;
            border-color: var(--dang);
            color: var(--dang);
        }
        .btn-danger:hover {
            background: var(--dang);
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        .btn-warning {
            background: transparent;
            border-color: var(--warn);
            color: var(--warn);
        }
        .btn-warning:hover {
            background: var(--warn);
            color: #000;
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text2);
        }
        .btn-ghost:hover {
            color: var(--text);
            background: var(--card);
            border-color: var(--border);
            box-shadow: none;
        }
        .btn-sm {
            padding: 0.35rem 0.8rem;
            font-size: 0.76rem;
            border-radius: 7px;
        }
        .btn-lg {
            padding: 0.75rem 1.8rem;
            font-size: 0.95rem;
            border-radius: 11px;
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            position: relative;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #181825 0%, #1a1030 30%, #0f1a2e 70%, #181825 100%);
            background-size: 300% 300%;
            animation: gradientShift 10s ease infinite;
            border: 1px solid var(--border);
            border-radius: var(--rad-xl);
            padding: 3.5rem 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 70% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .hero>* {
            position: relative;
            z-index: 1;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text2);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #c4b5fd;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.2rem;
        }
        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }
        .grid-4 {
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }

        /* Category Card */
        .cat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad-lg);
            padding: 2rem 1.8rem;
            cursor: pointer;
            transition: var(--tr);
            position: relative;
            overflow: hidden;
        }
        .cat-card:hover {
            border-color: var(--pri);
            background: var(--card-hover);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(124, 58, 237, 0.1);
        }
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--pri), var(--pri-light), transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        .cat-card:hover::before {
            transform: scaleX(1);
        }
        .cat-icon {
            width: 52px;
            height: 52px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            background: rgba(124, 58, 237, 0.1);
            color: var(--pri-light);
            transition: var(--tr);
        }
        .cat-card:hover .cat-icon {
            background: linear-gradient(135deg, var(--pri), #a78bfa);
            color: white;
            transform: rotate(5deg) scale(1.1);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
        }
        .cat-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .cat-card .cat-desc {
            color: var(--text3);
            font-size: 0.88rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .cat-card .cat-meta {
            display: flex;
            gap: 0.7rem;
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .cat-card .cat-meta span {
            background: var(--bg);
            padding: 0.3rem 0.7rem;
            border-radius: 7px;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-weight: 500;
        }

        /* Post Card */
        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad-lg);
            padding: 1.4rem;
            cursor: pointer;
            transition: var(--tr);
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            position: relative;
        }
        .post-card:hover {
            border-color: var(--border-light);
            background: var(--card-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }
        .post-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: var(--rad);
            background: var(--bg2);
            transition: var(--tr);
        }
        .post-card:hover .post-image {
            transform: scale(1.02);
        }
        .post-image-placeholder {
            width: 100%;
            height: 190px;
            border-radius: var(--rad);
            background: linear-gradient(135deg, var(--bg2), var(--card));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--text3);
            border: 1px dashed var(--border);
        }
        .post-tag {
            display: inline-block;
            background: rgba(124, 58, 237, 0.1);
            color: var(--pri-light);
            padding: 0.25rem 0.7rem;
            border-radius: 7px;
            font-size: 0.74rem;
            font-weight: 700;
            width: fit-content;
            letter-spacing: 0.02em;
        }
        .post-card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.4;
        }
        .post-card .post-desc {
            color: var(--text2);
            font-size: 0.87rem;
            line-height: 1.6;
            flex: 1;
        }
        .post-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--succ);
        }
        .post-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.78rem;
            color: var(--text3);
            flex-wrap: wrap;
        }
        .post-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .favorite-btn {
            position: absolute;
            top: 0.9rem;
            right: 0.9rem;
            background: rgba(0, 0, 0, 0.55);
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--tr);
            z-index: 5;
            opacity: 0;
        }
        .post-card:hover .favorite-btn {
            opacity: 1;
        }
        .favorite-btn.active {
            color: #f59e0b;
            opacity: 1 !important;
        }
        .vip-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 0.15rem 0.55rem;
            border-radius: 4px;
            font-size: 0.66rem;
            font-weight: 800;
            vertical-align: middle;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.22rem 0.55rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .badge-purple {
            background: rgba(124, 58, 237, 0.15);
            color: #c4b5fd;
        }
        .badge-green {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
        }
        .badge-red {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }
        .badge-yellow {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
        }
        .badge-blue {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }
        .badge-orange {
            background: rgba(249, 115, 22, 0.15);
            color: #fdba74;
        }
        .badge-pink {
            background: rgba(236, 72, 153, 0.15);
            color: #f9a8d4;
        }
        .owner-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 0.22rem 0.7rem;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        /* Alert */
        .alert {
            padding: 0.9rem 1.2rem;
            border-radius: 9px;
            margin: 0.6rem 0;
            font-size: 0.86rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            border: 1px solid;
        }
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.25);
            color: #93c5fd;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.25);
            color: #6ee7b7;
        }
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }
        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.25);
            color: #fcd34d;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad-xl);
            padding: 2rem;
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: scaleIn 0.3s ease-out;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .modal-close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--tr);
            font-size: 1rem;
        }
        .modal-close-btn:hover {
            background: var(--dang);
            color: white;
            border-color: var(--dang);
            transform: rotate(90deg);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.84rem;
            font-weight: 600;
            margin-bottom: 0.45rem;
            color: var(--text2);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.65rem 0.95rem;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--tr);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--pri);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Image Upload */
        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--tr);
            background: var(--input);
        }
        .image-upload-area:hover {
            border-color: var(--pri);
            background: rgba(124, 58, 237, 0.03);
        }
        .image-upload-area.has-image {
            border-color: var(--succ);
            border-style: solid;
        }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .image-gallery img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--tr);
        }
        .image-gallery img:hover {
            border-color: var(--dang);
        }

        /* Search */
        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 200px;
            padding: 0.65rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 0.9rem;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--pri);
        }
        .search-bar select {
            padding: 0.65rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 0.9rem;
        }

        /* Notification */
        .notification-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            width: 360px;
            max-height: 420px;
            overflow-y: auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--rad);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
            z-index: 200;
            display: none;
            margin-top: 0.5rem;
        }
        .notification-dropdown.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        .notification-item {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--tr);
            font-size: 0.86rem;
            display: flex;
            align-items: start;
            gap: 0.6rem;
        }
        .notification-item:hover {
            background: var(--card-hover);
        }
        .notification-item.unread {
            background: rgba(124, 58, 237, 0.05);
            border-left: 3px solid var(--pri);
        }
        .notification-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--pri);
            flex-shrink: 0;
            margin-top: 0.45rem;

                    hour: '2-digit',

            function showResetModal() {
                const modal = document.getElementById('modal');
                const box = document.getElementById('modalBox');

                let step = 1;
                let resetEmail = '';

                function renderStep() {
                    if (step === 1) {
                        box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 style="display:flex;align-items:center;gap:0.5rem;">
                    <i class="fas fa-lock" style="color:var(--pri);"></i> Şifre Sıfırlama
                </h3>
                <p style="color:var(--text3);margin-bottom:1.5rem;font-size:0.88rem;">
                    Kayıtlı e-posta adresinizi girin, size 6 haneli bir kod gönderelim.
                </p>
                <form onsubmit="handleResetStep1(event)">
                    <div class="form-group">
                        <label>📧 E-posta Adresiniz</label>
                        <input type="email" name="email" required placeholder="ornek@email.com" autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
                        <i class="fas fa-paper-plane"></i> Sıfırlama Kodu Gönder
                    </button>
                </form>
                <p style="text-align:center;margin-top:1rem;font-size:0.85rem;">
                    <a href="#" onclick="closeModal();showAuth('login');" style="color:var(--pri-light);text-decoration:none;">
                        <i class="fas fa-arrow-left"></i> Giriş sayfasına dön
                    </a>
                </p>
            `;
                    } else if (step === 2) {
                        box.innerHTML = `
                <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                <h3 style="display:flex;align-items:center;gap:0.5rem;">
                    <i class="fas fa-key" style="color:var(--succ);"></i> Kodu Girin
                </h3>
                <p style="color:var(--text3);margin-bottom:1rem;font-size:0.88rem;">
                    <strong style="color:var(--text);">${esc(resetEmail)}</strong> adresine 6 haneli bir kod gönderdik.
                </p>
                <div class="alert alert-info" style="font-size:0.82rem;">
                    <i class="fas fa-info-circle"></i> Mail gelmezse spam klasörünü kontrol edin.
                </div>
                <form onsubmit="handleResetStep2(event)" style="margin-top:1rem;">
                    <div class="form-group">
                        <label>🔑 6 Haneli Kod</label>
                        <input type="text" name="code" required maxlength="6" minlength="6"
                               placeholder="123456"
                               style="font-size:1.6rem;text-align:center;letter-spacing:0.4rem;font-weight:700;" autofocus>
                    </div>
                    <div class="form-group">
                        <label>🔒 Yeni Şifre</label>
                        <input type="password" name="new_password" required minlength="6"
                               placeholder="Yeni şifreniz (en az 6 karakter)">
                    </div>
                    <button type="submit" class="btn btn-success btn-lg" style="width:100%;">
                        <i class="fas fa-check-circle"></i> Şifreyi Güncelle
                    </button>
                </form>
                <p style="text-align:center;margin-top:0.8rem;font-size:0.85rem;">
                    <a href="#" onclick="step=1;resetEmail='';renderStep();" style="color:var(--pri-light);text-decoration:none;">
                        Kod gelmedi mi? Tekrar gönder
                    </a>
                </p>
            `;
                    }
                }

                window.handleResetStep1 = async function(e) {
                    e.preventDefault();
                    resetEmail = e.target.email.value.trim();
                    const sent = await sendResetCode(resetEmail);
                    if (sent) {
                        step = 2;
                        renderStep();
                    }
                };

                window.handleResetStep2 = function(e) {
                    e.preventDefault();
                    const code = e.target.code.value.trim();
                    const newPass = e.target.new_password.value;

                    const data = resetCodes[resetEmail.toLowerCase()];
                    if (!data || data.expires < Date.now()) {
                        alert('❌ Kod süresi dolmuş veya geçersiz! Lütfen tekrar kod isteyin.');
                        step = 1;
                        resetEmail = '';
                        renderStep();
                        return;
                    }

                    if (data.code !== code) {
                        alert('❌ Geçersiz kod! Lütfen tekrar deneyin.');
                        return;
                    }

                    const user = appData.users.find(u => u.id === data.userId);
                    if (!user) {
                        alert('❌ Kullanıcı bulunamadı!');
                        return;
                    }

                    user.password = newPass;
                    delete resetCodes[resetEmail.toLowerCase()];

                    appData.logs.push({
                        id: genId(),
                        user_id: user.id,
                        action: 'password_reset',
                        details: 'Şifre sıfırlandı',
                        created_at: new Date().toISOString()
                    });

                    saveData();
                    alert('✅ Şifreniz başarıyla güncellendi! Giriş yapabilirsiniz.');
                    closeModal();
                    showAuth('login');
                };

                renderStep();
                modal.classList.add('active');
            }

            function closeModal() {
                document.getElementById('modal').classList.remove('active');
                document.getElementById('notifDropdown')?.classList.remove('active');

            // ==================== SAYFA YÖNLENDİRME ====================

            function showPage(page, param) {
                appData.currentPage = page;
                switch (page) {
                    case 'home':
                        renderHome();
                        break;
                    case 'category':
                        renderCategory(param);
                        break;
                    case 'post':
                        renderPostDetail(param);
                        break;
                    case 'new-post':
                        renderNewPost();
                        break;
                    case 'admin':
                        renderAdmin();
                        break;
                    case 'profile':
                        renderProfile();
                        break;
                    case 'favorites':
                        renderFavorites();
                        break;
                }
                updateHeader();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // ==================== HEADER ====================

            function updateHeader() {
                const area = document.getElementById('userArea');
                const u = appData.currentUser;

                if (u) {
                    const unread = appData.notifications.filter(function(n) {
                        return n.user_id === u.id && !n.read;
                    }).length;

                    area.innerHTML = `
                <div class="user-chip">
                    <div class="user-avatar">${u.username.charAt(0).toUpperCase()}</div>
                    <span>${esc(u.username)}</span>
                    ${roleBadge(u.role)}
                    ${!u.email_verified ? ' <span class="badge badge-red">Doğrulanmamış</span>' : ''}
                </div>
                ${isMod() ? '<button class="btn btn-ghost btn-sm" onclick="showPage(\'admin\')"><i class="fas fa-shield-halved"></i> Panel</button>' : ''}
                <button class="btn btn-ghost btn-sm" onclick="showPage('favorites')"><i class="fas fa-star"></i> Favoriler</button>
                <div style="position:relative;">
                    <button class="btn btn-icon btn-ghost" onclick="toggleNotif()">
                        <i class="fas fa-bell"></i>
                        ${unread > 0 ? '<span class="notif-count">' + unread + '</span>' : ''}
                    </button>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="showPage('profile')"><i class="fas fa-user"></i></button>
                <button class="btn btn-primary btn-sm" onclick="showPage('new-post')"><i class="fas fa-plus"></i> İlan Ver</button>
                <button class="btn btn-ghost btn-sm" onclick="logout()" style="color:var(--dang);"><i class="fas fa-right-from-bracket"></i></button>
            `;
                } else {
                    area.innerHTML = `
                <button class="btn btn-ghost btn-sm" onclick="showAuth('login')"><i class="fas fa-right-to-bracket"></i> Giriş</button>
                <button class="btn btn-primary btn-sm" onclick="showAuth('register')"><i class="fas fa-user-plus"></i> Kayıt Ol</button>
            `;
                }
            }

            function toggleNotif() {
                const dd = document.getElementById('notifDropdown');
                const u = appData.currentUser;
                if (!u) return;

                const notifs = appData.notifications
                    .filter(function(n) { return n.user_id === u.id; })
                    .slice(0, 30);

                if (notifs.length === 0) {
                    dd.innerHTML =
                        '<div class="notification-item" style="justify-content:center;color:var(--text3);">🔔 Bildirim yok</div>';
                } else {
                    dd.innerHTML = notifs.map(function(n) {
                        return `
                    <div class="notification-item${n.read ? '' : ' unread'}" onclick="markNotifRead('${n.id}')">
                        ${!n.read ? '<div class="notification-dot"></div>' : ''}
                        <div>
                            <strong>${esc(n.message)}</strong>
                            <br>
                            <small style="color:var(--text3);">${fmtDate(n.created_at)}</small>
                        </div>
                    </div>
                `;
                    }).join('');
                }

                dd.classList.toggle('active');
            }

            function markNotifRead(nid) {
                const n = appData.notifications.find(function(x) { return x.id === nid; });
                if (n) {
                    n.read = true;
                    saveData();
                }
                toggleNotif();
                updateHeader();
            }

            // ==================== ANA SAYFA ====================

            function renderHome() {
                const main = document.getElementById('mainContent');

                const approved = appData.posts
                    .filter(function(p) { return p.status === 'approved'; })
                    .sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); })
                    .slice(0, 6);

                main.innerHTML = `
            <div class="hero">
                <h1>🚀 MarketPlace</h1>
                <p>Güvenli alışveriş platformu &mdash; Oyun, Giyim, Teknoloji</p>
                <div class="hero-badge">👑 Kurucu: <strong>TuncaySkay</strong></div>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 İlan ara... (başlık veya açıklama)">
                <select id="searchCat">
                    <option value="">Tüm Kategoriler</option>
                    ${appData.categories.map(function(c) { return '<option value="' + c.id + '">' + esc(c.name) + '</option>'; }).join('')}
                </select>
                <select id="searchSort">
                    <option value="newest">En Yeni</option>
                    <option value="oldest">En Eski</option>
                    <option value="price_asc">Fiyat (Artan)</option>
                    <option value="price_desc">Fiyat (Azalan)</option>
                </select>
                <button class="btn btn-primary" onclick="searchPosts()"><i class="fas fa-search"></i> Ara</button>
            </div>

            <div class="section-header">
                <h2><i class="fas fa-folder-open" style="color:var(--pri-light);"></i> Kategoriler</h2>
            </div>
            <div class="grid grid-3" style="margin-bottom:2.5rem;">
                ${appData.categories.map(function(c, i) {
                    return `
                        <div class="cat-card" onclick="showPage('category', '${c.slug}')" style="animation: fadeInUp 0.5s ease ${i * 0.12}s both;">
                            <div class="cat-icon">
                                ${c.slug === 'oyun' ? '🎮' : c.slug === 'giyim' ? '👕' : '💻'}
                            </div>
                            <h3>${esc(c.name)}</h3>
                            <p class="cat-desc">${esc(c.description)}</p>
                            <div class="cat-meta">
                                <span><i class="fas fa-clipboard-list"></i> ${postCount(c.id)} ilan</span>
                                ${modName(c) ? '<span><i class="fas fa-shield"></i> ' + esc(modName(c)) + '</span>' : ''}
                            </div>
                            <button class="btn btn-primary btn-sm" style="width:100%;">
                                İlanları Gör <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    `;
                }).join('')}
            </div>

            <div class="section-header">
                <h2><i class="fas fa-fire" style="color:#f59e0b;"></i> Son İlanlar</h2>
                ${approved.length > 0 ? '<button class="btn btn-ghost btn-sm" onclick="showPage(\'category\', \'oyun\')">Tümünü Gör <i class="fas fa-arrow-right"></i></button>' : ''}
            </div>
            <div class="grid grid-4" id="postsContainer">
                ${renderPostCards(approved)}
            </div>
        `;
            }

            function searchPosts() {
                const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
                const catId = document.getElementById('searchCat')?.value || '';
                const sort = document.getElementById('searchSort')?.value || 'newest';

                let posts = appData.posts.filter(function(p) { return p.status === 'approved'; });

                if (q) {
                    posts = posts.filter(function(p) {
                        return p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
                    });
                }

                if (catId) {
                    posts = posts.filter(function(p) { return p.category_id === parseInt(catId); });
                }

                if (sort === 'newest') {
                    posts.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
                } else if (sort === 'oldest') {
                    posts.sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
                } else if (sort === 'price_asc') {
                    posts.sort(function(a, b) { return a.price - b.price; });
                } else if (sort === 'price_desc') {
                    posts.sort(function(a, b) { return b.price - a.price; });
                }

                const container = document.getElementById('postsContainer');
                if (container) {
                    container.innerHTML = renderPostCards(posts) ||
                        '<div class="alert alert-info" style="grid-column:1/-1;"><i class="fas fa-search"></i> Sonuç bulunamadı.</div>';
                }
            }

            function renderPostCards(posts) {
                if (!posts || posts.length === 0) {
                    return '<div class="alert alert-info" style="grid-column:1/-1;"><i class="fas fa-info-circle"></i> Henüz ilan bulunmamaktadır.</div>';
                }

                return posts.map(function(p, i) {
                    const cat = appData.categories.find(function(c) { return c.id === p.category_id; });
                    const user = appData.users.find(function(u) { return u.id === p.user_id; });

                    let isFav = false;
                    if (appData.currentUser) {
                        isFav = appData.favorites.some(function(f) {
                            return f.user_id === appData.currentUser.id && f.post_id === p.id;
                        });
                    }

                    return `
                <div class="post-card" style="animation: fadeInUp 0.45s ease ${i * 0.08}s both;" onclick="showPage('post', '${p.id}')">
                    ${p.images && p.images.length > 0
                        ? '<img src="' + p.images[0] + '" class="post-image" alt="" loading="lazy">'
                        : '<div class="post-image-placeholder"><i class="fas fa-image"></i></div>'
                    }
                    <button class="favorite-btn${isFav ? ' active' : ''}" onclick="event.stopPropagation();toggleFavorite('${p.id}')">
                        <i class="fas fa-star"></i>
                    </button>
                    <span class="post-tag">${cat ? esc(cat.name) : 'Kategori'}</span>
                    <h3>${esc(p.title)}${p.vip ? ' <span class="vip-badge">VIP</span>' : ''}</h3>
                    <p class="post-desc">${esc(trunc(p.description, 100))}</p>
                    ${p.price > 0 ? '<div class="post-price">₺' + parseFloat(p.price).toFixed(2) + '</div>' : ''}
                    <div class="post-meta">
                        <span><i class="fas fa-user-circle"></i> ${user ? esc(user.username) : 'Anonim'}</span>
                        <span><i class="fas fa-comment"></i> ${appData.comments.filter(function(c) { return c.post_id === p.id; }).length}</span>
                        <span><i class="fas fa-eye"></i> ${p.views || 0}</span>
                    </div>
                </div>
            `;
                }).join('');
            }

            // ==================== FAVORİLER ====================

            function toggleFavorite(postId) {
                if (!appData.currentUser) {
                    alert('❌ Favorilere eklemek için giriş yapmalısınız!');
                    return;
                }

                const idx = appData.favorites.findIndex(function(f) {
                    return f.user_id === appData.currentUser.id && f.post_id === postId;
                });

                if (idx >= 0) {
                    appData.favorites.splice(idx, 1);
                } else {
                    appData.favorites.push({
                        id: genId(),
                        user_id: appData.currentUser.id,
                        post_id: postId,
                        created_at: new Date().toISOString()
                    });
                }

                saveData();

                if (appData.currentPage === 'favorites') {
                    showPage('favorites');
                } else if (appData.currentPage === 'post') {
                    showPage('post', postId);
                } else {
                    showPage(appData.currentPage || 'home');
                }
            }

            function renderFavorites() {
                const main = document.getElementById('mainContent');

                if (!appData.currentUser) {
                    showAuth('login');
                    return;
                }

                const favPosts = appData.favorites
                    .filter(function(f) { return f.user_id === appData.currentUser.id; })
                    .map(function(f) { return appData.posts.find(function(p) { return p.id === f.post_id; }); })
                    .filter(Boolean);

                main.innerHTML = `
            <h1 style="margin-bottom:1rem;">⭐ Favori İlanlarım (${favPosts.length})</h1>
            ${favPosts.length === 0
                ? '<div class="alert alert-info"><i class="fas fa-star"></i> Henüz favori ilanınız yok. İlanları gezerken yıldıza tıklayarak favorilere ekleyebilirsiniz.</div>'
                : '<div class="grid grid-4" style="margin-top:1rem;">' + renderPostCards(favPosts) + '</div>'
            }
        `;
            }

            // ==================== KATEGORİ SAYFASI ====================

            function renderCategory(slug) {
                const main = document.getElementById('mainContent');
                const cat = appData.categories.find(function(c) { return c.slug === slug; });

                if (!cat) {
                    renderHome();
                    return;
                }

                const posts = appData.posts
                    .filter(function(p) { return p.category_id === cat.id && p.status === 'approved'; })
                    .sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });

                main.innerHTML = `
            <button class="btn btn-ghost btn-sm" onclick="showPage('home')" style="margin-bottom:1rem;">
                <i class="fas fa-arrow-left"></i> Ana Sayfa
            </button>

            <h1 style="font-size:1.6rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">
                ${cat.slug === 'oyun' ? '🎮' : cat.slug === 'giyim' ? '👕' : '💻'}
                ${esc(cat.name)}
            </h1>
            <p style="color:var(--text3);margin-bottom:0.5rem;">
                ${esc(cat.description)} &bull; ${posts.length} ilan bulundu
            </p>
            ${modName(cat)
                ? '<span class="badge badge-purple"><i class="fas fa-shield"></i> Bölüm Yetkilisi: ' + esc(modName(cat)) + '</span>'
                : ''
            }

            <div class="grid grid-4" style="margin-top:1.5rem;">
                ${renderPostCards(posts)}
            </div>
        `;
            }

            // ==================== İLAN DETAY ====================

            function renderPostDetail(postId) {
                const main = document.getElementById('mainContent');
                const post = appData.posts.find(function(p) { return p.id === postId; });

                if (!post) {
                    renderHome();
                    return;
                }

                post.views = (post.views || 0) + 1;
                saveData();

                const cat = appData.categories.find(function(c) { return c.id === post.category_id; });
                const user = appData.users.find(function(u) { return u.id === post.user_id; });

                const comments = appData.comments
                    .filter(function(c) { return c.post_id === postId; })

            function addComment(e, postId) {
                e.preventDefault();
                if (!appData.currentUser || !isVerified()) {
                    alert('❌ Yorum yapmak için email doğrulaması gereklidir!');
                    return;
                }
                const text = e.target.comment_text.value.trim();
                if (!text) return;
                const post = appData.posts.find(function(p) { return p.id === postId; });
                if (!post || post.comments_locked) return;
                appData.comments.push({
                    id: genId(),
                    post_id: postId,
                    user_id: appData.currentUser.id,
                    text: text,
                    created_at: new Date().toISOString()
                });
                if (post.user_id !== appData.currentUser.id) {
                    addNotification(post.user_id, 'comment', 'İlanınıza yeni bir yorum yapıldı: ' + post.title, '');
                }
                saveData();
                showPage('post', postId);
            }

            function deleteComment(commentId, postId) {
                if (!confirm('Bu yorumu silmek istediğinize emin misiniz?')) return;
                const idx = appData.comments.findIndex(function(c) { return c.id === commentId; });
                if (idx >= 0) {
                    appData.comments.splice(idx, 1);
                    saveData();
                    showPage('post', postId);
                }
            }

            function toggleComments(postId) {
                const post = appData.posts.find(function(p) { return p.id === postId; });
                if (!post || !canModifyComments(post)) return;
                post.comments_locked = !post.comments_locked;
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: post.comments_locked ? 'comments_locked' : 'comments_unlocked',
                    details: 'İlan: ' + post.title,
                    created_at: new Date().toISOString()
                });
                saveData();
                showPage('post', postId);
            }

            function deletePost(postId) {
                if (!confirm('Bu ilanı silmek istediğinize emin misiniz? Bu işlem geri alınamaz!')) return;
                const post = appData.posts.find(function(p) { return p.id === postId; });
                if (!post || !canDeletePost(post)) {
                    alert('❌ Bu işlem için yetkiniz yok!');
                    return;
                }
                appData.posts = appData.posts.filter(function(p) { return p.id !== postId; });
                appData.comments = appData.comments.filter(function(c) { return c.post_id !== postId; });
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: 'post_deleted',
                    details: 'İlan: ' + post.title,
                    created_at: new Date().toISOString()
                });
                if (post.user_id !== appData.currentUser.id) {
                    addNotification(post.user_id, 'post_deleted', 'İlanınız yönetici tarafından silindi: ' + post.title, '');
                }
                saveData();
                alert('✅ İlan başarıyla silindi.');
                showPage('home');
            }

            function reportPost(postId) {
                if (!appData.currentUser) {
                    showAuth('login');
                    return;
                }
                const reason = prompt('Şikayet sebebinizi yazın:');
                if (!reason || !reason.trim()) return;
                appData.reports.push({
                    id: genId(),
                    post_id: postId,
                    user_id: appData.currentUser.id,
                    reason: reason.trim(),
                    status: 'pending',
                    created_at: new Date().toISOString()
                });
                saveData();
                alert('✅ Şikayetiniz alındı. Yetkililer en kısa sürede inceleyecektir.');
            }

                </form>
            </div>
        `;
                window._postImages = [];
            }

            async function handleImages(e) {
                const files = Array.from(e.target.files).slice(0, 5);
                const images = [];
                for (const file of files) {
                    if (file.size > 5 * 1024 * 1024) {
                        alert('❌ ' + file.name + ' dosyası 5MB\'dan büyük! Atlanıyor.');
                        continue;
                    }
                    const reader = new FileReader();
                    const dataUrl = await new Promise(resolve => {
                        reader.onload = e => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                    images.push(dataUrl);
                }
                window._postImages = images;
                const gallery = document.getElementById('imgGallery');
                if (gallery) {
                    gallery.innerHTML = images.map(function(img, i) {
                        return '<img src="' + img + '" onclick="removePostImage(' + i + ')" title="Kaldırmak için tıkla">';
                    }).join('');
                }
                const area = document.getElementById('imgArea');
                const removeBtn = document.getElementById('removeAllImagesBtn');
                if (area) area.classList.toggle('has-image', images.length > 0);
                if (removeBtn) removeBtn.style.display = images.length > 0 ? 'inline-flex' : 'none';
            }

            function removePostImage(index) {
                window._postImages.splice(index, 1);
                const gallery = document.getElementById('imgGallery');
                if (gallery) {
                    gallery.innerHTML = window._postImages.map(function(img, i) {
                        return '<img src="' + img + '" onclick="removePostImage(' + i + ')" title="Kaldırmak için tıkla">';
                    }).join('');
                }
                const area = document.getElementById('imgArea');
                const removeBtn = document.getElementById('removeAllImagesBtn');
                if (area) area.classList.toggle('has-image', window._postImages.length > 0);
                if (removeBtn) removeBtn.style.display = window._postImages.length > 0 ? 'inline-flex' : 'none';
            }

            function removeAllImages() {
                window._postImages = [];
                document.getElementById('imgGallery').innerHTML = '';
                document.getElementById('imgArea').classList.remove('has-image');
                document.getElementById('removeAllImagesBtn').style.display = 'none';
                document.getElementById('imgInput').value = '';
            }

            function submitPost(e) {

                const form = e.target;

                    vip: false,
                    views: 0,
                    created_at: new Date().toISOString(),
                    approved_by: null,

                    ${isAdmin() ? '<button class="admin-tab" onclick="switchTab(\'reports\', this)">🚩 Şikayetler <span class="badge badge-red">' + reportsPending + '</span></button>' : ''}

            function switchTab(tab, btn) {
                document.querySelectorAll('.admin-tab').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                const tc = document.getElementById('tabContent');
                tc.style.opacity = '0';
                tc.style.transform = 'translateY(10px)';
                setTimeout(function() {
                    switch (tab) {
                        case 'dash':
                            renderTabDash();
                            break;
                        case 'approve':
                            renderTabApprove();
                            break;
                        case 'users':
                            renderTabUsers();
                            break;
                        case 'cats':
                            renderTabCats();
                            break;
                        case 'reports':
                            renderTabReports();
                            break;
                        case 'logs':
                            renderTabLogs();
                            break;
                    }
                    tc.style.opacity = '1';
                    tc.style.transform = 'translateY(0)';
                    tc.style.transition = 'all 0.3s ease';
                }, 150);
            }

                const post = appData.posts.find(function(p) { return p.id === postId; });
                if (!post || !canApprove()) return;
                post.status = action === 'approve' ? 'approved' : 'rejected';
                post.approved_by = appData.currentUser.id;
                post.approved_at = new Date().toISOString();
                addNotification(post.user_id, 'post_' + action + 'd',
                    'İlanınız ' + (action === 'approve' ? 'onaylandı' : 'reddedildi') + ': ' + post.title, '');
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: 'post_' + action + 'd',
                    details: 'İlan: ' + post.title,
                    created_at: new Date().toISOString()
                });
                saveData();
                alert('✅ İlan ' + (action === 'approve' ? 'onaylandı' : 'reddedildi') + '!');

            function changeRole(userId, newRole) {
                const user = appData.users.find(function(u) { return u.id === userId; });
                if (!user || user.role === 'owner' || !canAddRole(newRole)) return;
                if (getUserLevel(appData.currentUser) <= getUserLevel(user)) {
                    alert('❌ Yetki seviyeniz bu kullanıcıyı yönetmek için yetersiz!');
                    return;
                }
                user.role = newRole;
                if (!['moderator', 'senior_moderator', 'chief_moderator', 'category_mod'].includes(newRole)) {
                    if (user.category_mod) {
                        const oldCat = appData.categories.find(c => c.slug === user.category_mod);
                        if (oldCat) oldCat.moderator_id = null;
                    }
                    user.category_mod = null;
                }
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: 'role_changed',
                    details: user.username + ' -> ' + newRole,
                    created_at: new Date().toISOString()
                });
                saveData();
                alert('✅ Kullanıcı rolü güncellendi!');
                renderAdmin();
            }

            function changeModCat(userId, slug) {
                const user = appData.users.find(function(u) { return u.id === userId; });
                if (!user || !canManageUsers()) return;
                if (user.category_mod) {
                    const oldCat = appData.categories.find(function(c) { return c.slug === user.category_mod; });
                    if (oldCat) oldCat.moderator_id = null;
                }
                user.category_mod = slug || null;
                if (slug) {
                    const newCat = appData.categories.find(function(c) { return c.slug === slug; });
                    if (newCat) newCat.moderator_id = userId;
                }
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: 'mod_category_changed',
                    details: user.username + ' -> ' + (slug || 'Kaldırıldı'),
                    created_at: new Date().toISOString()
                });
                saveData();
                alert('✅ Bölüm yetkilisi ataması güncellendi!');
                renderAdmin();
            }

            function toggleBan(userId) {
                if (userId === appData.currentUser.id) {
                    alert('❌ Kendinizi banlayamazsınız!');
                    return;
                }
                const user = appData.users.find(function(u) { return u.id === userId; });
                if (!user || user.role === 'owner' || getUserLevel(appData.currentUser) <= getUserLevel(user)) {
                    alert('❌ Yetkiniz yok!');
                    return;
                }
                user.status = user.status === 'active' ? 'banned' : 'active';
                if (user.status === 'banned') {
                    // Oturumu kapat
                    localStorage.removeItem('mp_session');
                }
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: user.status === 'banned' ? 'user_banned' : 'user_unbanned',
                    details: 'Kullanıcı: ' + user.username,
                    created_at: new Date().toISOString()
                });
                saveData();
                alert('✅ Kullanıcı ' + (user.status === 'active' ? 'banı kaldırıldı' : 'banlandı') + '!');
                renderAdmin();
            }

            function doLogin(e) {
                e.preventDefault();
                const form = e.target;
                const username = form.username.value.trim();
                const email = form.email.value.trim();
                const password = form.password.value;
                const user = appData.users.find(function(u) {
                    return (u.username === username || u.email === email) && u.password === password;
                });
                if (!user) {
                    alert('❌ Kullanıcı adı, e-posta veya şifre hatalı!');
                    return;
                }
                if (user.status === 'banned') {
                    alert('❌ Hesabınız banlanmış durumda! Yönetici ile iletişime geçin.');
                    return;
                }
                user.last_login = new Date().toISOString();
                appData.currentUser = user;
                localStorage.setItem('mp_session', user.id);
                appData.logs.push({
                    id: genId(),
                    user_id: user.id,
                    action: 'login',
                    details: 'Giriş yapıldı',
                    created_at: new Date().toISOString()
                });
                saveData();
                closeModal();
                updateHeader();
                showPage('home');
            }

            function doRegister(e) {
                e.preventDefault();
                const form = e.target;
                const username = form.username.value.trim();
                const email = form.email.value.trim();
                const password = form.password.value;
                const phone = form.phone ? form.phone.value.trim() : '';
                if (appData.users.find(function(u) { return u.username === username; })) {
                    alert('❌ Bu kullanıcı adı zaten alınmış!');
                    return;
                }
                if (appData.users.find(function(u) { return u.email === email; })) {
                    alert('❌ Bu e-posta adresi zaten kayıtlı!');
                    return;
                }
                const newUser = {
                    id: genId(),
                    username: username,
                    email: email,
                    password: password,
                    phone: phone,
                    role: 'user',
                    category_mod: null,
                    status: 'active',
                    email_verified: false,
                    bio: '',
                    rating: 0,
                    reviews: 0,
                    created_at: new Date().toISOString(),
                    last_login: new Date().toISOString()
                };
                appData.users.push(newUser);
                appData.currentUser = newUser;
                localStorage.setItem('mp_session', newUser.id);
                appData.logs.push({
                    id: genId(),
                    user_id: newUser.id,
                    action: 'register',
                    details: 'Yeni kayıt',
                    created_at: new Date().toISOString()
                });
                saveData();
                closeModal();
                updateHeader();
                showPage('home');
                sendVerifyCode(email, username).then(function() {
                    alert('📧 Doğrulama kodu e-posta adresinize gönderildi! Lütfen email adresinizi doğrulayın.');
                    setTimeout(function() {
                        showVerifyModal();
                    }, 800);
                });
            }

            function logout() {
                if (appData.currentUser) {
                    appData.logs.push({
                        id: genId(),
                        user_id: appData.currentUser.id,
                        action: 'logout',
                        details: 'Çıkış yapıldı',
                        created_at: new Date().toISOString()
                    });
                }
                appData.currentUser = null;
                localStorage.removeItem('mp_session');
                saveData();
                updateHeader();
                showPage('home');
            }

            // ==================== DOĞRULAMA İŞLEMLERİ ====================

            function verifyEmail(e) {
                e.preventDefault();
                const code = e.target.code.value.trim();
                const email = appData.currentUser.email.toLowerCase();
                const vc = verifyCodes[email];
                if (!vc || vc.expires < Date.now()) {
                    alert('❌ Doğrulama kodunun süresi dolmuş! Lütfen tekrar kod isteyin.');
                    closeModal();
                    return;
                }
                if (vc.code !== code) {
                    alert('❌ Hatalı kod! Lütfen tekrar deneyin.');
                    return;
                }
                appData.currentUser.email_verified = true;
                const userInList = appData.users.find(x => x.id === appData.currentUser.id);
                if (userInList) {
                    userInList.email_verified = true;
                }
                delete verifyCodes[email];
                saveData();
                closeModal();
                updateHeader();
                showPage('profile');
                alert('✅ Email adresiniz başarıyla doğrulandı!');
            }

            function resendVerifyCode() {
                const user = appData.currentUser;
                if (!user) return;
                sendVerifyCode(user.email, user.username).then(function(sent) {
                    if (sent) {
                        alert('✅ Yeni doğrulama kodu email adresinize gönderildi!');
                    }
                });
            }

            function changePassword(e) {
                e.preventDefault();
                const oldPass = e.target.old_pass.value;
                const newPass = e.target.new_pass.value;
                if (appData.currentUser.password !== oldPass) {
                    alert('❌ Mevcut şifre hatalı!');
                    return;
                }
                appData.currentUser.password = newPass;
                const userInList = appData.users.find(u => u.id === appData.currentUser.id);
                if (userInList) userInList.password = newPass;
                appData.logs.push({
                    id: genId(),
                    user_id: appData.currentUser.id,
                    action: 'password_changed',
                    details: 'Şifre değiştirildi',
                    created_at: new Date().toISOString()
                });
                saveData();
                closeModal();
                alert('✅ Şifreniz başarıyla güncellendi!');
            }

            // ==================== GLOBAL FONKSİYONLAR ====================
            // Tüm onclick handler'ları window'a ekle
            window.showPage = showPage;
            window.showAuth = showAuth;
            window.closeModal = closeModal;
            window.showResetModal = showResetModal;
            window.showVerifyModal = showVerifyModal;
            window.showChangePasswordModal = showChangePasswordModal;
            window.toggleNotif = toggleNotif;
            window.markNotifRead = markNotifRead;
            window.searchPosts = searchPosts;
            window.toggleFavorite = toggleFavorite;
            window.addComment = addComment;
            window.deleteComment = deleteComment;
            window.toggleComments = toggleComments;
            window.deletePost = deletePost;
            window.reportPost = reportPost;
            window.submitPost = submitPost;
            window.handleImages = handleImages;
            window.removePostImage = removePostImage;
            window.removeAllImages = removeAllImages;
            window.approvePost = approvePost;
            window.changeRole = changeRole;
            window.changeModCat = changeModCat;
            window.toggleBan = toggleBan;
            window.resolveReport = resolveReport;
            window.switchTab = switchTab;
            window.doLogin = doLogin;
            window.doRegister = doRegister;
            window.logout = logout;
            window.verifyEmail = verifyEmail;
            window.resendVerifyCode = resendVerifyCode;
            window.changePassword = changePassword;
            window.handleResetStep1 = window.handleResetStep1;
            window.handleResetStep2 = window.handleResetStep2;

            // ==================== EVENT LISTENERS ====================
            window.onclick = function(e) {
                if (e.target === document.getElementById('modal')) {
                    closeModal();
                }
                if (!e.target.closest('.notification-dropdown') && !e.target.closest('.btn-icon')) {
                    document.getElementById('notifDropdown')?.classList.remove('active');
                }
            };

            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });

            // ==================== BAŞLATMA ====================
            window.onload = async function() {
                loadData();
                await loadFromJSONBin();

                const urlParams = new URLSearchParams(window.location.search);
                const verifyToken = urlParams.get('verify');
                const verifyEmail = urlParams.get('email');

                if (verifyToken && verifyEmail) {
                    const decodedEmail = decodeURIComponent(verifyEmail).toLowerCase();
                    const vc = verifyCodes[decodedEmail];

                    if (vc && vc.token === verifyToken && vc.expires > Date.now()) {
                        const user = appData.users.find(function(u) {
                            return u.email.toLowerCase() === decodedEmail;
                        });

                        if (user) {
                            user.email_verified = true;
                            delete verifyCodes[decodedEmail];
                            saveData();
                            window.history.replaceState({}, document.title, window.location.pathname);

                            document.getElementById('mainContent').innerHTML = `
                        <div style="max-width:500px;margin:3rem auto;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-xl);padding:3rem 2rem;text-align:center;">
                            <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
                            <h1 style="color:var(--succ);">Hesabınız Doğrulandı!</h1>
                            <p style="color:var(--text2);margin:1rem 0;"><strong>${esc(user.username)}</strong>, email adresiniz doğrulandı.</p>
                            <button class="btn btn-primary btn-lg" onclick="showPage('home')">Ana Sayfaya Git</button>
                        </div>
                    `;
                            updateHeader();
                            return;
                        }
                    }

                    document.getElementById('mainContent').innerHTML = `
                <div style="max-width:500px;margin:3rem auto;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-xl);padding:3rem 2rem;text-align:center;">
                    <div style="font-size:4rem;margin-bottom:1rem;">❌</div>
                    <h1 style="color:var(--dang);">Doğrulama Başarısız!</h1>
                    <p style="color:var(--text2);margin:1rem 0;">Link geçersiz veya süresi dolmuş.</p>
                    <button class="btn btn-primary btn-lg" onclick="showPage('home')">Ana Sayfaya Git</button>
                </div>
            `;
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return;
                }

                updateHeader();
                renderHome();
            };
        })();
    </script>
</body>
</html>
